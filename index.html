<script>
(function(){
'use strict';

/* ============================================================
   定数・ユーティリティ
   ============================================================ */

const HISTORY_URL = 'https://api.p2pquake.net/v2/history?codes=551&codes=552&limit=100';
// /v2/history がoffsetを深くしても過去分を返さなくなった後、さらに遡って読み込むための
// フォールバック先。JMA地震観測(code:551相当)専用で、津波(552)は含まれない。
// until_date(指定日以前)パラメタで絞り込み、取得できた中で最も古い日付の前日を次回の
// until_dateにすることで、1ページ100件のoffset刻みに縛られず大きく過去へ進める。
// 注意: 1日あたり100件を超える群発地震があった場合、その日の古い方の一部が
// 取りこぼされる可能性がある(until_dateを同日のまま据え置くと無限ループになるため、
// 安全側として常に前日へ進める設計にしている)。
const JMA_QUAKE_URL = 'https://api.p2pquake.net/v2/jma/quake?limit=100';
const WS_URL = 'https://api.p2pquake.net/v2/ws';

// WolfX EEW(緊急地震速報) API
// - WS: 発表のたびに1件のEEWオブジェクトが配信される(複数のEEWが同時発生していても、
//   API自体は常に単一オブジェクトしか送ってこない。複数を扱うにはこちら側でEventIDごとに
//   状態を持ち、受信したEventIDのエントリだけを更新するマージ処理が必要)
// - 初期取得: 現在発表中のEEWを1件返す(無ければおそらく空 or 404的な応答)
// - 自動失効: JMAのEEWは仕様上5分程度で最終報として扱われるため、こちら側でも
//   発生時刻(OriginTime)から5分経過したエントリは表示から自動的に取り除く(EEW_TTL_MS)
const EEW_WS_URL = 'wss://ws-api.wolfx.jp/all_eew';
const EEW_INITIAL_URL = 'https://api.wolfx.jp/jma_eew.json';
const EEW_TTL_MS = 5 * 60 * 1000;

/* ============================================================
   設定(ユーザー環境設定)
   ============================================================ */
// localStorageに保存し、次回起動時にも設定を引き継ぐ。
// キーが存在しない(初回起動)場合のみデフォルト値を用いる。
const SETTINGS_STORAGE_KEY = 'eq-app-settings-v1';
const DEFAULT_SETTINGS = {
  eewSound: false,       // EEW受信時に警告音を鳴らす
  browserNotify: false,  // EEW発表時にブラウザ通知を出す
  autoFlyTo: true,        // 新着の地震・EEWの震源へ自動でカメラを移動する
  autoSwitchTab: true     // 他のタブを見ていても、新着のEEW/地震情報/津波情報が来たら自動的にそのタブへ切り替える(割り込み表示)
};
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
    if(!raw) return { ...DEFAULT_SETTINGS };
    const parsed = JSON.parse(raw);
    return { ...DEFAULT_SETTINGS, ...parsed };
  }catch(err){
    return { ...DEFAULT_SETTINGS };
  }
}
function saveSettings(settings){
  try{
    localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings));
  }catch(err){
    console.error('設定の保存に失敗しました', err);
  }
}
const settings = loadSettings();

// EEW受信音: Web Audio APIで短いチャイム音を生成する(外部音声ファイルに依存しない)。
let audioCtx = null;
function playEEWChime(){
  if(!settings.eewSound) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    // 「ポーン、ポーン」のような2音チャイムを模した簡易実装
    [0, 0.35].forEach((offset, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = i === 0 ? 880 : 1046.5;
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.28, now + offset + 0.03);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.32);
    });
  }catch(err){
    console.error('EEW受信音の再生に失敗しました', err);
  }
}

// ブラウザ通知: 許可が下りていない場合はトグルON時に許可をリクエストする。
function showEEWNotification(evt){
  if(!settings.browserNotify) return;
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  try{
    const kindLabel = evt.isWarn ? '警報' : '予報';
    new Notification(`緊急地震速報(${kindLabel})`, {
      body: `${evt.hypocenter}で地震 / 推定最大震度${evt.maxIntensity}`,
      tag: 'eew-' + evt.eventId
    });
  }catch(err){
    console.error('ブラウザ通知の表示に失敗しました', err);
  }
}

// scale(10刻み) -> 表示用キー・クラス・ラベル
// 長周期地震動階級(1〜4)と、対応する震度の配色クラスの対応表。
// 気象庁の目安(階級1≒震度3, 階級2≒震度5弱, 階級3≒震度6弱, 階級4≒震度7)に沿って、
// EEWカードの長周期地震動階級バッジの文字色を、対応する震度の文字色に揃える。
const LPGM_CLASS_TO_SCALE_CLS = { 1:'s3', 2:'s5w', 3:'s6w', 4:'s7' };

function scaleInfo(scale){
  if(scale == null) return {key:'-', cls:'', label:'-'};
  if(scale >= 70) return {key:'7',  cls:'s7',  label:'7'};
  if(scale >= 60) return {key:'6+', cls:'s6s', label:'6+'};
  if(scale >= 55) return {key:'6-', cls:'s6w', label:'6-'};
  if(scale >= 50) return {key:'5+', cls:'s5s', label:'5+'};
  if(scale >= 45) return {key:'5-', cls:'s5w', label:'5-'};
  if(scale >= 40) return {key:'4',  cls:'s4',  label:'4'};
  if(scale >= 30) return {key:'3',  cls:'s3',  label:'3'};
  if(scale >= 20) return {key:'2',  cls:'s2',  label:'2'};
  if(scale >= 10) return {key:'1',  cls:'s1',  label:'1'};
  return {key:'-', cls:'', label:'-'};
}

// 震度速報バッジ表示ラベル(震度アイコンセットのキーに合わせる: 1,2,3,4,5-,5+,6-,6+,7)
function scaleBadgeLabel(scale){
  const info = scaleInfo(scale);
  return info.label;
}

function fmtTime(isoLike){
  // p2pquakeのtimeは "2026/06/31 12:69:00" 形式(タイムゾーンなしJST)
  if(!isoLike) return '';
  return isoLike.replace(/:\d\d$/, '').replace(/^(\d{4})\/(\d{2})\/(\d{2})/, '$1/$2/$3');
}

// EEWの日時は秒まで表示する(WolfXのAnnouncedTime/OriginTimeは秒精度で意味を持つため、
// 地震情報一覧(fmtTime)と違って末尾の秒は削らない)。
function fmtTimeWithSeconds(isoLike){
  if(!isoLike) return '';
  return isoLike.replace(/^(\d{4})\/(\d{2})\/(\d{2})/, '$1/$2/$3');
}

function magLabel(mag){
  if(mag == null || mag < 0) return '不明';
  return 'M' + mag.toFixed(1);
}

function depthLabel(depth){
  if(depth == null) return '-';
  if(depth === 0) return 'ごく浅い';
  if(depth < 0) return '不明';
  return depth + 'km';
}

// JMA震源分布図の配色(深さ・マグニチュードの目安色として共通利用)
// 紫→こげ茶→赤→オレンジ→山吹→黄→緑→水色→青
const HYPO_COLORS = {
  purple: '#9c1ff5',
  maroon: '#9b1f13',
  red:    '#ea3323',
  orange: '#eb622b',
  amber:  '#f4ae3e',
  yellow: '#ffff55',
  green:  '#75fb4c',
  cyan:   '#4ca7f8',
  blue:   '#0001f6',
};

function depthColor(depth){
  if(depth == null || depth < 0) return '#7a7f8c'; // 不明(震源未確定時): 灰色
  if(depth === 0) return HYPO_COLORS.maroon;                // ごく浅い
  if(depth < 10) return HYPO_COLORS.red;
  if(depth < 20) return HYPO_COLORS.orange;
  if(depth < 30) return HYPO_COLORS.amber;
  if(depth < 50) return HYPO_COLORS.yellow;
  if(depth < 150) return HYPO_COLORS.green;
  if(depth < 300) return HYPO_COLORS.cyan;
  return HYPO_COLORS.blue;
}

function magColor(mag){
  if(mag == null || mag < 0) return '#7a7f8c'; // 不明(震源未確定時): 灰色。M2.0未満の実データ色(青)と紛らわしいため分離
  if(mag >= 9.0) return HYPO_COLORS.purple;
  if(mag >= 8.0) return HYPO_COLORS.maroon;
  if(mag >= 7.0) return HYPO_COLORS.red;
  if(mag >= 6.0) return HYPO_COLORS.orange;
  if(mag >= 5.0) return HYPO_COLORS.amber;
  if(mag >= 4.0) return HYPO_COLORS.yellow;
  if(mag >= 3.0) return HYPO_COLORS.green;
  if(mag >= 2.0) return HYPO_COLORS.cyan;
  return HYPO_COLORS.blue;
}

function tsunamiInfo(domesticTsunami){
  switch(domesticTsunami){
    case 'Warning':
    case 'Watch':
      return {cls:'warning', text:'津波警報等を発表中です'};
    case 'Checking':
      return {cls:'watch', text:'津波の有無を調査中です'};
    case 'NonEffective':
    case 'None':
      return {cls:'none', text:'この地震による津波の心配はありません'};
    default:
      return null;
  }
}

/* ============================================================
   震度分布・観測点の地図表示
   ============================================================ */

const SCALE_COLOR = {
  10:'rgb(242,242,255)', 20:'rgb(0,170,255)', 30:'rgb(0,65,255)',
  40:'rgb(250,230,150)', 45:'rgb(255,230,0)', 50:'rgb(255,153,0)',
  55:'rgb(255,40,0)', 60:'rgb(165,0,33)', 70:'rgb(180,0,104)'
};
function nearestScaleColor(scale){
  const keys = [10,20,30,40,45,50,55,60,70];
  let best = keys[0];
  for(const k of keys){ if(scale >= k) best = k; }
  return SCALE_COLOR[best];
}

// 震度速報など震源が不明なイベントでは、p2pquakeが緯度経度に -200 等の
// 範囲外ダミー値を入れて返すことがある(nullではないため != null のチェックだけでは弾けない)。
// これをそのままmaplibreのLngLatに渡すと "Invalid LngLat latitude" 例外が発生し、
// renderScaleOnMapの残りの処理(震度ポリゴンの塗り分け・カメラ移動)が実行されなくなってしまう。
// そのため座標を使う前に必ずこの関数で妥当性を確認する。
function isValidLatLng(lat, lng){
  return typeof lat === 'number' && typeof lng === 'number' &&
    isFinite(lat) && isFinite(lng) &&
    lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180;
}

// 区域コード -> 区域名(細分区域) の逆引き。stations_data.jsのacから収集。
const AREA_NAME_BY_CODE = {};
(function buildAreaNameIndex(){
  for(const id in STATIONS){
    const st = STATIONS[id];
    if(st.ac && st.an) AREA_NAME_BY_CODE[st.ac] = st.an;
  }
})();

// pointsの addr(細分区域名) から eq_saibun の code を引く名前逆引き
const AREA_CODE_BY_NAME = {};
(function buildAreaCodeIndex(){
  for(const code in AREA_NAME_BY_CODE){
    AREA_CODE_BY_NAME[AREA_NAME_BY_CODE[code]] = code;
  }
})();

// WolfXのWarnArea[].Chiiki は「宮城県」「福島県中通り」のような気象庁予報区名で、
// JMAの細分区域(stations_data.jsのan、例:「宮城県北部」)とは表記の粒度がずれることがある。
// 完全一致がなければ、前方一致(短い方が長い方の先頭に一致)で拾えるだけ拾う。
// 1つのChiiki名に複数の細分区域がぶら下がっている場合(例:「宮城県」に対し「宮城県北部」
// 「宮城県南部」の両方)は該当する区域すべてを塗る。
const ALL_AREA_NAMES = Object.keys(AREA_CODE_BY_NAME);
function findAreaCodesForChiiki(chiiki){
  if(!chiiki) return [];
  const name = String(chiiki).replace(/\u3000/g, ' ').trim();
  if(!name) return [];
  const exact = AREA_CODE_BY_NAME[name];
  if(exact) return [exact];
  const codes = [];
  for(const areaName of ALL_AREA_NAMES){
    const shorter = name.length <= areaName.length ? name : areaName;
    const longer  = name.length <= areaName.length ? areaName : name;
    if(shorter.length >= 2 && longer.startsWith(shorter)){
      codes.push(AREA_CODE_BY_NAME[areaName]);
    }
  }
  return codes;
}

// 観測点名 -> 観測点情報 の逆引き(p2pquakeのpoints[].addrは観測点名で来るケースに対応)
const STATION_BY_NAME = {};
(function buildStationNameIndex(){
  for(const id in STATIONS){
    const st = STATIONS[id];
    STATION_BY_NAME[st.n] = st;
  }
})();

// 区域コード -> 代表座標(所属観測点群の緯度経度の平均) の索引。
// EEWジェネレータの震度自動計算(震源からの距離減衰)で、各細分区域までの距離を
// 求めるために使う。stations_data.jsには区域そのものの座標は無いため、
// その区域に属する観測点の座標を平均して代表点とする簡易的な近似。
const AREA_CENTER_BY_CODE = {};
(function buildAreaCenterIndex(){
  const sums = {}; // code -> {latSum, lngSum, count}
  for(const id in STATIONS){
    const st = STATIONS[id];
    if(!st.ac || typeof st.la !== 'number' || typeof st.lo !== 'number') continue;
    if(!sums[st.ac]) sums[st.ac] = { latSum:0, lngSum:0, count:0 };
    sums[st.ac].latSum += st.la;
    sums[st.ac].lngSum += st.lo;
    sums[st.ac].count += 1;
  }
  for(const code in sums){
    const s = sums[code];
    AREA_CENTER_BY_CODE[code] = { lat: s.latSum / s.count, lng: s.lngSum / s.count };
  }
})();


// GeoJSONジオメトリ(Polygon/MultiPolygon等)の全座標をLngLatBoundsに反映する
function extendBoundsWithGeometry(bounds, geometry){
  if(!geometry) return;
  const walk = (coords, depth) => {
    if(depth === 0){
      bounds.extend(coords); // [lng, lat]
      return;
    }
    for(const c of coords) walk(c, depth - 1);
  };
  const depthByType = {
    Point: 0, MultiPoint: 1, LineString: 1,
    MultiLineString: 2, Polygon: 2, MultiPolygon: 3
  };
  const depth = depthByType[geometry.type];
  if(depth == null) return;
  walk(geometry.coordinates, depth);
}

function renderScaleOnMap(event){
  if(!mapReady) { onMapReady(() => renderScaleOnMap(event)); return; }

  // 地震情報タブは「確定した地震情報」のみを見るためのタブであり、EEW(緊急地震速報)の
  // 推定震度の塗り分け(WarnArea)はここに混ざってはいけない。EEWタブから移動してきた際に
  // 前のEEW塗り分けが地図に残ったままにならないよう、まずクリアしておく。
  clearEEWWarnAreaOnMap();

  const points = event.points || [];

  // --- 細分区域の塗り分け(区域名→最大震度) ---
  // 震度速報(ScalePrompt)は points[].isArea が true になり、addr が細分区域名そのもの。
  // 各地の震度に関する情報(DetailScale)は isArea が false で、addr は観測点名。
  const areaMaxScale = {};
  for(const p of points){
    if(!p.isArea) continue; // isArea:false は観測点名なのでここでは対象外
    const code = AREA_CODE_BY_NAME[p.addr];
    if(!code) continue;
    const sc = p.scale;
    if(areaMaxScale[code] == null || sc > areaMaxScale[code]) areaMaxScale[code] = sc;
  }
  const saibunSrc = map.getSource('saibun-scale');
  const areaBounds = new maplibregl.LngLatBounds();
  let hasArea = false;
  if(saibunSrc && window.__saibunFeatures){
    const features = window.__saibunFeatures
      .filter(f => areaMaxScale[f.properties.code] != null)
      .map(f => ({
        ...f,
        properties: { ...f.properties, color: nearestScaleColor(areaMaxScale[f.properties.code]) }
      }));
    saibunSrc.setData({type:'FeatureCollection', features});
    // 塗られたポリゴンの座標をすべてboundsに含める(震度速報でのカメラ移動用)
    for(const f of features){
      extendBoundsWithGeometry(areaBounds, f.geometry);
      hasArea = true;
    }
  }

  // --- 観測点表示 ---
  const stationFeatures = [];
  const bounds = new maplibregl.LngLatBounds();
  let hasPoint = false;
  for(const p of points){
    if(p.isArea) continue;
    // stations_data.js は地点名(addr)そのままではなく個別観測点。
    // p2pquake の points[].addr は観測点名または細分区域名のため、名前一致で照合。
    const match = STATION_BY_NAME[p.addr];
    if(!match) continue;
    const info = scaleInfo(p.scale);
    stationFeatures.push({
      type:'Feature',
      geometry:{type:'Point', coordinates:[match.lo, match.la]},
      properties:{ name: match.n, label: info.label, cls: info.cls, key: info.key, color: nearestScaleColor(p.scale), scaleOrder: p.scale ?? 0 }
    });
    bounds.extend([match.lo, match.la]);
    hasPoint = true;
  }
  // 震度が弱い順に並べる -> 描画順で後になる(=上に重なる)のは震度が強い観測点
  stationFeatures.sort((a, b) => a.properties.scaleOrder - b.properties.scaleOrder);
  const stSrc = map.getSource('stations');
  if(stSrc) stSrc.setData({type:'FeatureCollection', features: stationFeatures});

  // --- 震源表示 ---
  // 震度速報など震源が不明なイベントでは、p2pquakeが緯度経度に -200 等の範囲外ダミー値を
  // 入れて返すことがある(null ではないため != null のチェックだけでは弾けない)。
  // これをそのままmaplibreに渡すと例外が発生し、以降の描画・カメラ移動が止まってしまうため、
  // isValidLatLng で範囲チェックしてから使用する。
  const hyp = event.earthquake && event.earthquake.hypocenter;
  const hypValid = !!hyp && isValidLatLng(hyp.latitude, hyp.longitude);
  const hypSrc = map.getSource('hypocenter');
  if(hypSrc){
    if(hypValid){
      hypSrc.setData({
        type:'FeatureCollection',
        features:[{ type:'Feature', geometry:{type:'Point', coordinates:[hyp.longitude, hyp.latitude]}, properties:{kind:'earthquake'} }]
      });
    } else {
      hypSrc.setData({type:'FeatureCollection', features:[]});
    }
  }

  // --- PS円(P波・S波到達円)はEEW(緊急地震速報)専用の演出とする ---
  // 地震情報タブは「すでに発生した地震の確定情報」を見るためのタブであり、
  // 過去の地震(数分前〜数日前)を選択してもPS円を出さない。
  // (以前はここでも震源確定+発生時刻があれば起動していたが、既に発生から
  //  長時間経過した地震でも経過秒数だけで円が計算され、地球を何周分も伸びた
  //  円が描かれてしまう不具合があったため、地震情報タブでは常に非表示にする)
  stopPSCircleAnimation();

  // --- カメラ移動 ---
  // 震源・観測点・塗られた細分区域(震度速報)のすべてが視野に入るようboundsを統合する。
  // 震度速報(震源不明)の場合は hasArea のみで cameraBounds が構築され、
  // 塗られた震度ポリゴン全体にズーム・移動する。
  const cameraBounds = new maplibregl.LngLatBounds();
  let hasCameraTarget = false;
  if(hasPoint){ cameraBounds.extend(bounds); hasCameraTarget = true; }
  if(hasArea){ cameraBounds.extend(areaBounds); hasCameraTarget = true; }
  if(hypValid){
    cameraBounds.extend([hyp.longitude, hyp.latitude]);
    hasCameraTarget = true;
  }
  if(hasCameraTarget){
    // 観測点数が多い(=symbolレイアウトの再計算コストが高い)ほどアニメーション時間を
    // 短くし、カメラ移動中に毎フレーム発生する再配置計算のトータル負荷を抑える。
    // 観測点が少ない通常時は従来通り800msでなめらかに動かす。
    const animDuration = stationFeatures.length > 150 ? 350 : 800;
    map.fitBounds(cameraBounds, {padding:{top:60,bottom:60,left:60,right:60}, maxZoom:8.5, duration:animDuration});
  }
}

function clearScaleOnMap(){
  if(!mapReady) return;
  const saibunSrc = map.getSource('saibun-scale');
  if(saibunSrc) saibunSrc.setData({type:'FeatureCollection', features:[]});
  const stSrc = map.getSource('stations');
  if(stSrc) stSrc.setData({type:'FeatureCollection', features:[]});
  const hypSrc = map.getSource('hypocenter');
  if(hypSrc) hypSrc.setData({type:'FeatureCollection', features:[]});
  clearEEWWarnAreaOnMap();
  stopPSCircleAnimation();
}

// 津波イベントの震源アイコンを地図に表示する(水色フチの×印、地震情報・EEWと共通のhypocenterソースを使う)。
// 実際のp2pquake配信には震源座標が含まれないため、latitude/longitudeが無いイベント(実データ由来)では
// 何も表示しない。津波ジェネレータ(M値ベース自動計算)で指定した震源のみが対象。
// 津波タブを見ている時だけ表示し、他のタブ(地震情報・EEW)を見ている最中に地図上の震源表示を
// 勝手に上書きしないようにする(showEEWOnMap・renderScaleOnMapと同様の設計)。
function renderTsunamiHypocenterOnMap(evt){
  if(!mapReady){ onMapReady(() => renderTsunamiHypocenterOnMap(evt)); return; }
  if(state.activeTab !== 'tsunami') return;
  const hypSrc = map.getSource('hypocenter');
  if(!hypSrc) return;
  const valid = evt && isValidLatLng(evt.latitude, evt.longitude);
  hypSrc.setData({
    type:'FeatureCollection',
    features: valid ? [{ type:'Feature', geometry:{type:'Point', coordinates:[evt.longitude, evt.latitude]}, properties:{kind:'tsunami'} }] : []
  });
  if(valid && settings.autoFlyTo){
    map.flyTo({ center:[evt.longitude, evt.latitude], zoom: Math.max(map.getZoom(), 5.5), duration:800 });
  }
}

// EEWのWarnArea(区域ごとの推定震度)を、確定震度と同じ細分区域ポリゴン(eq_saibun.geojson)を
// 使って塗り分ける。Chiiki名から該当する細分区域コードを引き、区域ごとの最大推定震度で
// 色付けする(1つのChiikiに複数の細分区域が対応する場合は同じ色になる)。
// 現在有効な(TTL内・取消されていない)全EEWのWarnArea(区域ごとの推定震度)を合算し、
// 区域ごとの最大震度で塗り分ける。
// 「1件だけ選んで表示」ではなく「今起きている全EEWをまとめて俯瞰する」ための表示のため、
// 選択中のEEW(state.selectedEEWId)に関わらず、state.eewEvents(有効な全件)を対象にする。
// 複数のEEWが同時に発表されている場合、区域ごとに最も大きい推定震度を採用する。
function renderAllEEWWarnAreaOnMap(){
  if(!mapReady){ onMapReady(renderAllEEWWarnAreaOnMap); return; }
  const src = map.getSource('eew-warnarea-scale');
  if(!src || !window.__saibunFeatures) return;

  const areaMaxScale = {};
  for(const evt of state.eewEvents.values()){
    if(evt.isCancel) continue;
    for(const a of (evt.warnArea || [])){
      const chiiki = a.Chiiki || a.name;
      const shindoLabel = a.Shindo != null ? a.Shindo : a.shindo;
      const scale = jmaIntensityToScale(shindoLabel);
      if(scale == null) continue;
      for(const code of findAreaCodesForChiiki(chiiki)){
        if(areaMaxScale[code] == null || scale > areaMaxScale[code]) areaMaxScale[code] = scale;
      }
    }
  }
  if(Object.keys(areaMaxScale).length === 0){
    src.setData({type:'FeatureCollection', features:[]});
    return;
  }
  const features = window.__saibunFeatures
    .filter(f => areaMaxScale[f.properties.code] != null)
    .map(f => ({
      ...f,
      properties: { ...f.properties, color: nearestScaleColor(areaMaxScale[f.properties.code]) }
    }));
  src.setData({type:'FeatureCollection', features});
}

function clearEEWWarnAreaOnMap(){
  if(!mapReady) return;
  const src = map.getSource('eew-warnarea-scale');
  if(src) src.setData({type:'FeatureCollection', features:[]});
}

/* ============================================================
   PS円(P波・S波到達円のアニメーション表示)
   ============================================================ */
// JMA 2001年式走時表(traveltime_data.js の JMA_TRAVELTIME)を用いて、
// 「発生時刻からの経過秒数」から「P波面・S波面が到達している震央距離(km)」を求め、
// 震源を中心とした円(概算の測地円)としてGeoJSONポリゴンを生成し、地図上にアニメーション表示する。
//
// 走時表は table[depth(文字列)] = [[distance_km, p_time_s, s_time_s], ...] という形式で、
// 距離方向は間引かれた代表点(0,5,10,...,2000km)のみを持つ近似テーブル。
// 深さは最も近い代表深さ(depths配列)にスナップし、距離方向は前後の代表点から線形補間する。
// 逆に「経過時間 -> 到達距離」を求める際も、時間の並びが距離に対して単調増加であることを
// 利用して同様に線形補間する。

// 与えられた深さ(km)に最も近い、走時表が持つ代表深さのキー(文字列)を返す。
function nearestTraveltimeDepthKey(depthKm){
  if(typeof JMA_TRAVELTIME === 'undefined' || !JMA_TRAVELTIME.depths) return null;
  const depths = JMA_TRAVELTIME.depths;
  let best = depths[0];
  let bestDiff = Math.abs(depthKm - best);
  for(const d of depths){
    const diff = Math.abs(depthKm - d);
    if(diff < bestDiff){ best = d; bestDiff = diff; }
  }
  return String(best);
}

// 走時表の1深さ分のテーブル(distance, p_time, s_time の配列)から、
// 経過時間 elapsedSec に対応する震央距離(km)を線形補間で求める。
// waveIndex: 1ならP波(p_time列)、2ならS波(s_time列)。
// elapsedSecがテーブルの最大距離(2000km相当)を超えた場合は、表の最後の区間
// (1900km->2000km)から求まる実測平均速度(km/s)でそのまま等速延長した距離を返す。
// これにより「表の外に出た瞬間に円の更新が止まり、巨大なまま固まって見える」詰まりを
// 解消し、常に一定速度で滑らかに広がり続けるようにする。
function distanceForElapsedTime(rows, elapsedSec, waveIndex){
  if(!rows || rows.length === 0) return null;
  if(elapsedSec < rows[0][waveIndex]) return null; // 震源直下にもまだ到達していない(通常elapsedSec>=0で起きない)
  for(let i = 0; i < rows.length - 1; i++){
    const t0 = rows[i][waveIndex];
    const t1 = rows[i+1][waveIndex];
    if(elapsedSec >= t0 && elapsedSec <= t1){
      if(t1 === t0) return rows[i][0];
      const ratio = (elapsedSec - t0) / (t1 - t0);
      return rows[i][0] + ratio * (rows[i+1][0] - rows[i][0]);
    }
  }
  // --- 表の最大距離を超えた場合の一定速度延長 ---
  // 表の最後の区間の実測値からP波/S波それぞれの速度(km/s)を算出し、
  // (例: 秒速3.8km決定・10s経過なら+38km、秒速6km決定・20s経過なら+120km、という具合に)
  // その速度のまま等速で距離を伸ばし続ける。深さごとの走時表を基準にした速度なので、
  // 震源の深さによる伝播速度の違いも自然に反映される。
  const last = rows[rows.length - 1];
  const prev = rows[rows.length - 2];
  if(!last || !prev) return last ? last[0] : null;
  const dt = last[waveIndex] - prev[waveIndex];
  const dd = last[0] - prev[0];
  if(dt <= 0 || dd <= 0) return last[0]; // 速度が求まらない異常データの場合は表の最大距離で足踏みさせる
  const speedKmPerSec = dd / dt;
  const elapsedBeyond = elapsedSec - last[waveIndex];
  return last[0] + speedKmPerSec * elapsedBeyond;
}

// 震源(lat,lng,depth)と経過秒数から、P波面・S波面それぞれの到達震央距離(km)を返す。
// 表の最大距離を超えた後も一定速度で延長されるため、震源直下にすら到達していない
// (通常起きない)場合を除き、基本的にnullにはならない。
function calcPSDistances(depthKm, elapsedSec){
  if(typeof JMA_TRAVELTIME === 'undefined') return {pDistanceKm:null, sDistanceKm:null};
  const key = nearestTraveltimeDepthKey(Math.max(0, depthKm || 0));
  const rows = key != null ? JMA_TRAVELTIME.table[key] : null;
  if(!rows) return {pDistanceKm:null, sDistanceKm:null};
  return {
    pDistanceKm: distanceForElapsedTime(rows, elapsedSec, 1),
    sDistanceKm: distanceForElapsedTime(rows, elapsedSec, 2)
  };
}

// 中心(lat,lng)から半径radiusKmの円を、地球球体近似(測地線)でGeoJSON Polygonとして生成する。
// stepsが多いほど滑らかになるが、円が小さいうちは48分割で十分な一方、
// 半径が大きくなるほど1辺あたりの画面上の長さが伸びてカクカクして見えてしまう。
// そのため半径に応じてstepsを段階的に増やし、大きな円ほど多角形の分割数を増やして滑らかにする。
// (円が大きい=1辺のピクセル長が伸びやすい状況ほど、より多くの頂点で角を目立たなくする)
const EARTH_RADIUS_KM = 6371.0088;
function stepsForRadiusKm(radiusKm){
  if(radiusKm == null) return 48;
  if(radiusKm < 300) return 48;
  if(radiusKm < 800) return 72;
  if(radiusKm < 2000) return 96;
  if(radiusKm < 6000) return 128;
  return 160;
}
function geodesicCirclePolygon(centerLat, centerLng, radiusKm, steps){
  steps = steps || stepsForRadiusKm(radiusKm);
  const coords = [];
  const latRad = centerLat * Math.PI / 180;
  const lngRad = centerLng * Math.PI / 180;
  const angDist = radiusKm / EARTH_RADIUS_KM;
  for(let i = 0; i <= steps; i++){
    const bearing = (i / steps) * 2 * Math.PI;
    const lat2 = Math.asin(
      Math.sin(latRad) * Math.cos(angDist) +
      Math.cos(latRad) * Math.sin(angDist) * Math.cos(bearing)
    );
    const lng2 = lngRad + Math.atan2(
      Math.sin(bearing) * Math.sin(angDist) * Math.cos(latRad),
      Math.cos(angDist) - Math.sin(latRad) * Math.sin(lat2)
    );
    coords.push([lng2 * 180 / Math.PI, lat2 * 180 / Math.PI]);
  }
  return {
    type:'Feature',
    geometry:{ type:'Polygon', coordinates:[coords] },
    properties:{}
  };
}

// --- アニメーション状態管理 ---
// requestAnimationFrame(毎フレーム=最大60回/秒)で毎回GeoJSONを作り直してsetDataすると、
// ブラウザのタブスロットリングやメインスレッドの混雑状況次第でフレーム間隔が不安定になり、
// 「速くなったり遅くなったりする」体感のガクツキにつながっていた。
// PS円は見た目上そこまで高いフレームレートを必要としないため、setIntervalによる
// 固定間隔(PS_ANIM_INTERVAL_MS)更新に切り替え、フレームレート変動の影響を受けないようにする。
const PS_ANIM_INTERVAL_MS = 200; // 1秒間に5回更新(見た目には十分滑らか)
const psAnim = {
  timerId: null,
  hypocenter: null, // {lat, lng, depthKm, originTimeMs}
  lastPDistanceKm: null, // 直前に描画したP波円の半径(km)。変化がなければsetDataを省略する
  lastSDistanceKm: null,
};

function stopPSCircleAnimation(){
  if(psAnim.timerId != null){
    clearInterval(psAnim.timerId);
    psAnim.timerId = null;
  }
  psAnim.hypocenter = null;
  psAnim.lastPDistanceKm = null;
  psAnim.lastSDistanceKm = null;
  if(mapReady){
    const pSrc = map.getSource('ps-circle-p');
    const sSrc = map.getSource('ps-circle-s');
    if(pSrc) pSrc.setData({type:'FeatureCollection', features:[]});
    if(sSrc) sSrc.setData({type:'FeatureCollection', features:[]});
  }
}

// 半径がほぼ変わっていない(0.5km未満の差)場合は、GeoJSON再構築・setDataそのものを省略する。
// 更新間隔(PS_ANIM_INTERVAL_MS)自体が粗いため誤差は無視できるレベルで、
// 無駄な再描画を減らして負荷とガクツキをさらに抑える。
function almostEqual(a, b){
  if(a == null || b == null) return a === b;
  return Math.abs(a - b) < 0.5;
}

function psCircleAnimationTick(){
  if(!psAnim.hypocenter){ stopPSCircleAnimation(); return; }
  const { lat, lng, depthKm, originTimeMs } = psAnim.hypocenter;
  const elapsedSec = (Date.now() - originTimeMs) / 1000;

  const pSrc = map.getSource('ps-circle-p');
  const sSrc = map.getSource('ps-circle-s');

  if(elapsedSec < 0){
    // 発生時刻前(クロックのずれ等)は円を出さない
    if(pSrc) pSrc.setData({type:'FeatureCollection', features:[]});
    if(sSrc) sSrc.setData({type:'FeatureCollection', features:[]});
    psAnim.lastPDistanceKm = null;
    psAnim.lastSDistanceKm = null;
    return;
  }

  const { pDistanceKm, sDistanceKm } = calcPSDistances(depthKm, elapsedSec);

  if(pSrc && !almostEqual(pDistanceKm, psAnim.lastPDistanceKm)){
    pSrc.setData({
      type:'FeatureCollection',
      features: pDistanceKm != null ? [geodesicCirclePolygon(lat, lng, pDistanceKm)] : []
    });
    psAnim.lastPDistanceKm = pDistanceKm;
  }
  if(sSrc && !almostEqual(sDistanceKm, psAnim.lastSDistanceKm)){
    sSrc.setData({
      type:'FeatureCollection',
      features: sDistanceKm != null ? [geodesicCirclePolygon(lat, lng, sDistanceKm)] : []
    });
    psAnim.lastSDistanceKm = sDistanceKm;
  }

  // S波円が地球上どこからでも到達しうる距離(半周=約20000km)を十分に超えたら、
  // 地図上ではもう意味を持たない(画面外を延々と広がり続けるだけ)ため自動停止する。
  // (表の範囲を超えても一定速度で距離を返すようになったため、以前のような
  //  「pDistanceKm/sDistanceKmがnullになったら止める」判定はもう使えない)
  const PS_ANIM_AUTO_STOP_DISTANCE_KM = 20040; // 地球半周(π*EARTH_RADIUS_KM)に余裕を持たせた値
  if(sDistanceKm != null && sDistanceKm > PS_ANIM_AUTO_STOP_DISTANCE_KM){
    stopPSCircleAnimation();
  }
}

// 選択中の地震(震源確定済み・有効な緯度経度)についてPS円アニメーションを開始する。
// 既に別の震源でアニメーション中なら、そちらを止めて新しい震源に切り替える。
// EEW専用の演出のため、発生時刻から一定時間(PS_ANIM_MAX_AGE_MS)以上経過している場合は
// そもそも起動しない(何らかの理由で古いEEWデータが渡された場合の保険)。
const PS_ANIM_MAX_AGE_MS = 10 * 60 * 1000; // 10分
function startPSCircleAnimation(lat, lng, depthKm, originTimeIsoLike){
  if(!mapReady){ onMapReady(() => startPSCircleAnimation(lat, lng, depthKm, originTimeIsoLike)); return; }
  const originTimeMs = parseJstTimeToEpochMs(originTimeIsoLike);
  if(originTimeMs == null) { stopPSCircleAnimation(); return; }
  if(Date.now() - originTimeMs > PS_ANIM_MAX_AGE_MS){ stopPSCircleAnimation(); return; }
  if(psAnim.timerId != null) clearInterval(psAnim.timerId);
  psAnim.hypocenter = { lat, lng, depthKm: depthKm || 0, originTimeMs };
  psAnim.lastPDistanceKm = null;
  psAnim.lastSDistanceKm = null;
  psCircleAnimationTick(); // 開始直後の見た目の遅延を防ぐため即座に1回描画する
  psAnim.timerId = setInterval(psCircleAnimationTick, PS_ANIM_INTERVAL_MS);
}

// 津波の発表区域レイヤー(色付き塗り分け)を地図から消す。
// updateTsunamiLayer()が使うwindow.__tsunamiFeatures自体は保持したまま、
// ソースの表示だけを空にする(タブを離れる際などに呼ぶ想定)。
function clearTsunamiOnMap(){
  if(!mapReady) return;
  const src = map.getSource('tsunami-forecast');
  if(src) src.setData({type:'FeatureCollection', features:[]});
}

// アクティブなタブに応じて、地図上に出すべき情報オーバーレイだけを出し分ける。
// - 地震情報タブ: 選択中の地震の震度分布・観測点・震源(既存のselectEvent側で描画済みのものを保持)
// - EEWタブ: 選択中EEWの震源のみ(震度分布・観測点・津波は消す)
// - 津波タブ: 津波の発表区域レイヤーのみ(震度分布・観測点・震源は消す)
// - 設定タブ: 地図はそのまま表示するが、情報オーバーレイは全て消す
function syncMapOverlayToTab(){
  if(!mapReady){ onMapReady(syncMapOverlayToTab); return; }
  if(state.activeTab === 'earthquake'){
    clearTsunamiOnMap();
    const evt = state.events.find(e => e.id === state.selectedId);
    if(evt && evt.type === 'earthquake') renderScaleOnMap(evt.raw); else clearScaleOnMap();
  } else if(state.activeTab === 'eew'){
    clearScaleOnMap();
    clearTsunamiOnMap();
    const evt = state.eewEvents.get(state.selectedEEWId);
    if(evt) showEEWOnMap(evt);
  } else if(state.activeTab === 'tsunami'){
    clearScaleOnMap();
    updateTsunamiLayer();
    const latestTsunamiEvt = state.events.find(e => e.type === 'tsunami');
    renderTsunamiHypocenterOnMap(latestTsunamiEvt || null);
  } else {
    // 設定タブ: 地図そのものは表示したまま、情報だけ全て消す
    clearScaleOnMap();
    clearTsunamiOnMap();
  }
}

/* ============================================================
   イベント一覧(状態管理・描画)
   ============================================================ */

const state = {
  events: [],       // 表示用に正規化したイベント配列(新しい順、地震・津波用)
  selectedId: null,
  seenIds: new Set(),
  activeTab: 'earthquake', // 'earthquake' | 'eew' | 'tsunami'
  eewEvents: new Map(), // EventID -> 正規化EEWデータ(複数のEEWを同時保持するため)
  selectedEEWId: null, // 地図に震源を表示中のEEWのEventID
  // --- 無限スクロール(過去ログの追加読み込み)用 ---
  historyOffset: 100,     // (未使用) 追加読み込みはjma/quake一本化のため、/v2/historyのoffsetはもう進めない
  historyExhausted: false,// (未使用) 同上。/v2/historyは初期取得(fetchHistory)・再接続補完(fillGapFromHistory)でのみ使う
  // /v2/jma/quake は until_date(指定日以前, yyyyMMdd)で絞り込める。offsetではなくこちらを使うことで、
  // 「取得した中で最も古い日付」を次回の起点にでき、1ページ100件のoffset刻みに縛られず
  // 大きく過去へジャンプできる(古い地震が少ない期間でも空振りページを重ねずに進める)。
  jmaUntilDate: null,     // 次に読む /v2/jma/quake の until_date(yyyyMMdd文字列)。nullなら指定なし(=最新から)
  jmaExhausted: false,    // /v2/jma/quake もこれ以上過去分を返さなくなったらtrue
  lastHistoryOldestDate: null, // /v2/historyで最後に取得できた最古の地震発生日(yyyyMMdd)。jma初回のuntil_dateに引き継ぎ、切り替え時の隙間を防ぐ
  loadingMore: false      // 追加読み込みの多重リクエスト防止
};

const listEl = document.getElementById('event-list');

// p2pquake生データ -> 表示用に正規化
// p2pquakeのイベントID取得。
// History API(/v2/history)のレスポンスは "id"、WebSocket配信のメッセージは "_id" と
// フィールド名が異なる(WebSocketはMongoDBの _id をそのまま流用しているため)。
// 両方に対応しないとWebSocket経由のイベントのidが undefined になり、
// 重複防止(seenIds)やマージ処理が正しく機能しなくなる。
function eqId(raw){
  return raw.id != null ? raw.id : raw._id;
}

// raw.issue.type から情報段階を判定する。
// ScalePrompt: 震度速報(震源不明、区域単位の震度のみ)
// Destination: 震源情報(震源確定、震度情報なし)
// DetailScale ほか: 各地の震度に関する情報＝地震情報(震源確定、観測点単位の震度あり)
function eqStage(raw){
  const t = raw.issue && raw.issue.type;
  if(t === 'ScalePrompt') return 'prompt';
  if(t === 'Destination') return 'destination';
  return 'detail'; // DetailScale, Foreign等はまとめて「地震情報」段階として扱う
}

function normalizeEvent(raw){
  if(raw.code === 551){
    const eq = raw.earthquake || {};
    const hyp = eq.hypocenter || {};
    const stage = eqStage(raw);
    return {
      id: eqId(raw),
      code: 551,
      type: 'earthquake',
      stage,
      time: eq.time,
      // 震度速報(ScalePrompt)は震源そのものが未確定な段階のため、hyp.nameが無いのは
      // 「取得に失敗した」のではなく仕様上当然のこと。紛らわしい「不明」ではなく
      // 「震度速報」であることが分かる表示にする。
      place: hyp.name || (stage === 'prompt' ? '震度速報' : '不明'),
      mag: hyp.magnitude,
      depth: hyp.depth,
      maxScale: eq.maxScale,
      domesticTsunami: eq.domesticTsunami,
      raw
    };
  }
  if(raw.code === 552){
    const areas = raw.areas || [];
    let worst = null;
    for(const a of areas){
      if(!worst || tsunamiGradeRank(a.grade) > tsunamiGradeRank(worst.grade)) worst = a;
    }
    return {
      id: eqId(raw),
      code: 552,
      type: 'tsunami',
      time: raw.time,
      place: worst ? worst.name : '津波予報',
      grade: worst ? worst.grade : null,
      areas,
      // 実際のp2pquake配信には震源座標は含まれないが、津波ジェネレータ(M値ベース自動計算)は
      // 震源緯度経度を指定して区域を計算するため、その座標があれば地図に震源アイコンを出すために保持する。
      latitude: typeof raw.latitude === 'number' ? raw.latitude : null,
      longitude: typeof raw.longitude === 'number' ? raw.longitude : null,
      raw
    };
  }
  return null;
}

function tsunamiGradeRank(grade){
  return {Watch:1, Warning:2, MajorWarning:3}[grade] || 0;
}

function scaleBadgeHtml(maxScale){
  const info = scaleInfo(maxScale);
  const small = (info.key && info.key.length >= 2) ? ' small-num' : '';
  return `<div class="scale-badge ${info.cls}${small}">${info.label}</div>`;
}

function renderEventCard(evt){
  const card = document.createElement('div');
  card.className = 'eq-card';
  card.dataset.id = evt.id;
  if(evt.id === state.selectedId) card.classList.add('selected');

  if(evt.type === 'earthquake'){
    const tInfo = tsunamiInfo(evt.domesticTsunami);
    // 震度速報(prompt)段階ではp2pquake側にそもそも規模・深さの情報が来ないため、
    // 「不明」チップを出すより欄ごと非表示にした方が誤解がない。
    const metaHtml = evt.stage === 'prompt' ? '' : `
          <div class="eq-card-meta">
            <span class="meta-chip mag" style="border-color:${magColor(evt.mag)};">${magLabel(evt.mag)}</span>
            <span class="meta-chip depth" style="border-color:${depthColor(evt.depth)};">${depthLabel(evt.depth)}</span>
          </div>`;
    card.innerHTML = `
      <div class="eq-card-main">
        ${scaleBadgeHtml(evt.maxScale)}
        <div class="eq-card-info">
          <div class="eq-card-time">${fmtTime(evt.time)}ごろ</div>
          <div class="eq-card-place">${evt.place}</div>${metaHtml}
        </div>
      </div>
      ${tInfo ? `<div class="tsunami-banner ${tInfo.cls}">${tInfo.text}</div>` : ''}
    `;
  }

  card.addEventListener('click', () => selectEvent(evt.id));
  return card;
}

/* ============================================================
   津波情報サマリーパネル
   ============================================================ */
// 津波情報(552)は「発表するたびに全区域をまとめて配信する」性質のため、
// 地震情報のように過去の発表を1件ずつカード化して選択させる意味がない。
// 現在発表中の状況を「種別(警報等の階級)ごとにグループ化した区域一覧」として
// 1枚のパネルにまとめて表示する。地図側は updateTsunamiLayer() が別途担当する。

const TSUNAMI_GRADE_LABEL = {
  MajorWarning: '大津波警報',
  Warning: '津波警報',
  Watch: '津波注意報'
};

// 種別バッジ用の波アイコンは、タブ切り替え用アイコン(#tab-rail)専用とするため、
// 大津波警報等のグループバッジでは使わず、単色チップで表現する。

// p2pquakeのareas[].maxHeight(あれば)から「高さ」の表示用ラベルを作る。
// グループ化のキーとしても使うため、value(数値)があればそれを、無ければ
// description(例:"3m以上"など)をそのまま使う。両方無ければ「不明」扱い。
function tsunamiHeightLabel(area){
  const mh = area && area.maxHeight;
  if(!mh) return '高さ不明';
  if(mh.value != null && mh.value >= 0) return `${mh.value}m`;
  if(mh.description) return mh.description;
  return '高さ不明';
}

// 高さグループの並び替え用: 数値があれば数値の大きい順、無ければ末尾(小さい扱い)
function tsunamiHeightRank(area){
  const mh = area && area.maxHeight;
  if(mh && mh.value != null && mh.value >= 0) return mh.value;
  return -1;
}

// p2pquakeのareas[].firstHeight(あれば)から「到達予想時刻」の表示文字列を作る。
//   condition:"ただちに津波が到達すると予想" のように時刻を伴わない場合はconditionを表示
//   arrivalTimeがあれば時刻を"HH:MM到達予想"の形式で表示
//   どちらも無ければ非表示
function tsunamiEtaInfo(area){
  const fh = area && area.firstHeight;
  if(!fh) return null;
  if(fh.arrivalTime){
    const t = fmtTime(fh.arrivalTime);
    const timePart = t.split(' ').pop(); // "HH:MM"部分のみ取り出す
    return { text: `${timePart}到達予想`, arrived:false };
  }
  if(fh.condition) return { text: fh.condition, arrived: area.immediate === true };
  return null;
}

function renderTsunamiSummary(){
  listEl.innerHTML = '';

  const latestTsunami = state.events.find(e => e.type === 'tsunami');
  if(!latestTsunami || !latestTsunami.areas || latestTsunami.areas.length === 0){
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.textContent = EMPTY_STATE_TEXT.tsunami;
    listEl.appendChild(empty);
    return;
  }

  // 発表中(grade有り)の区域のみを対象に、種別(階級)ごとにグループ化する
  const areasWithGrade = latestTsunami.areas.filter(a => a.grade && TSUNAMI_GRADE_LABEL[a.grade]);
  if(areasWithGrade.length === 0){
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.textContent = EMPTY_STATE_TEXT.tsunami;
    listEl.appendChild(empty);
    return;
  }

  const byGrade = new Map(); // grade -> areas[]
  for(const a of areasWithGrade){
    if(!byGrade.has(a.grade)) byGrade.set(a.grade, []);
    byGrade.get(a.grade).push(a);
  }
  // 危険度が高い等級から表示(大津波警報 > 警報 > 注意報)
  const orderedGrades = [...byGrade.keys()].sort((g1, g2) => tsunamiGradeRank(g2) - tsunamiGradeRank(g1));

  const wrap = document.createElement('div');
  wrap.id = 'tsunami-summary';

  const updated = document.createElement('div');
  updated.className = 'tsunami-updated';
  updated.textContent = `${fmtTime(latestTsunami.time)}発表`;
  wrap.appendChild(updated);

  for(const grade of orderedGrades){
    const areas = byGrade.get(grade);

    // 種別の中を、さらに高さでグループ化する
    const byHeight = new Map(); // heightLabel -> areas[]
    for(const a of areas){
      const label = tsunamiHeightLabel(a);
      if(!byHeight.has(label)) byHeight.set(label, []);
      byHeight.get(label).push(a);
    }
    // 高さが大きいグループから表示(不明・記述のみのものは末尾)
    const orderedHeights = [...byHeight.keys()].sort((h1, h2) => {
      const r1 = Math.max(...byHeight.get(h1).map(tsunamiHeightRank));
      const r2 = Math.max(...byHeight.get(h2).map(tsunamiHeightRank));
      return r2 - r1;
    });

    const heightGroupsHtml = orderedHeights.map(heightLabel => {
      const areasInHeight = byHeight.get(heightLabel).slice().sort((a, b) => a.name.localeCompare(b.name, 'ja'));
      return `
        <div class="tsunami-height-group">
          <div class="tsunami-height-head">
            <span>${heightLabel}</span>
            <span class="tsunami-height-count">${areasInHeight.length}区域</span>
          </div>
          <div class="tsunami-area-list">
            ${areasInHeight.map(a => {
              const eta = tsunamiEtaInfo(a);
              return `
                <div class="tsunami-area-row">
                  <span class="tsunami-area-name">${a.name}</span>
                  ${eta ? `<span class="tsunami-area-eta${eta.arrived ? ' arrived' : ''}">${eta.text}</span>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('');

    const group = document.createElement('div');
    group.className = 'tsunami-grade-group';
    group.innerHTML = `
      <div class="tsunami-grade-head">
        <div class="tsunami-grade-chip" style="background:${TSUNAMI_GRADE_COLOR[grade]||'#666'};"></div>
        <div>
          <div class="tsunami-grade-title" style="color:${TSUNAMI_GRADE_COLOR[grade]||'#fff'};">${TSUNAMI_GRADE_LABEL[grade]}</div>
          <div class="tsunami-grade-sub">${areas.length}区域に発表中</div>
        </div>
      </div>
      ${heightGroupsHtml}
    `;
    wrap.appendChild(group);
  }

  listEl.appendChild(wrap);
}

/* ============================================================
   EEW(緊急地震速報)パネル
   ============================================================ */
// WolfXのEEW配信(wss://ws-api.wolfx.jp/all_eew)は「発表のたびに1件のオブジェクトを送る」
// 形式のため、地震・津波(p2pquake)と違い複数のEEWを同時に扱うにはこちら側での状態管理が要る。
//   - EventIDをキーにMapで保持し、同じEventIDの続報が来たら該当エントリだけを上書きする
//   - JMAのEEWは仕様上、発生から5分程度で最終報として扱われるため、発生時刻(OriginTime)から一定時間(EEW_TTL_MS)経過
//     したエントリ、またはisCancel(取消)されたエントリは一覧から自動的に取り除く

// WolfXのMaxIntensity(例:"1","5弱","5強","6弱","6強","7")を、既存のscaleInfo()が
// 受け取る10刻みscale値に変換する。これにより震度速報カード(scale-badge)と同じ
// 気象庁配色(.s1〜.s7)をEEWバッジでもそのまま再利用できる。
// WolfXのOriginTime/AnnouncedTimeは "2024/01/01 12:34:56" 形式のJST文字列(タイムゾーン情報なし)。
// そのままDate.parseに渡すとブラウザによって解釈が不安定(特にSafariは"/"区切りに弱い)なため、
// 手動でパースしてJSTとして扱い、UTCベースのepoch msに変換する。
function parseJstTimeToEpochMs(s){
  if(!s) return null;
  // 月/日/時/分/秒は2桁ゼロ埋めが基本だが、古い/jma/quakeデータ等で1桁表記
  // (例: "2026/6/25 7:30:00")が混じっていることがあり、\d{2}固定だとパース失敗して
  // 文字列完全一致にフォールバックし、同一地震のマージ判定に失敗する原因になっていた。
  // そのため各項目を1〜2桁許容にする。
  const m = String(s).trim().match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})[ T](\d{1,2}):(\d{1,2}):(\d{1,2})/);
  if(!m) return null;
  const [, y, mo, d, h, mi, se] = m.map(Number);
  // JST(UTC+9)固定として、UTC epochに変換する
  return Date.UTC(y, mo - 1, d, h - 9, mi, se);
}

// "2024/01/01 12:34:56"のようなJST時刻文字列から、/v2/jma/quakeのuntil_dateパラメタ用に
// yyyyMMdd形式の日付文字列を取り出す。
function jstTimeToYyyyMmDd(s){
  if(!s) return null;
  const m = String(s).trim().match(/^(\d{4})[\/-](\d{2})[\/-](\d{2})/);
  if(!m) return null;
  return m[1] + m[2] + m[3];
}

// yyyyMMdd文字列を1日前の日付に変換する(until_dateの次ページ用)。
// 同じuntil_dateで再取得すると同日分が重複しやすいため、境界日は前日にずらして進める。
function yyyyMmDdMinusOneDay(yyyymmdd){
  const y = Number(yyyymmdd.slice(0, 4));
  const mo = Number(yyyymmdd.slice(4, 6));
  const d = Number(yyyymmdd.slice(6, 8));
  const dt = new Date(Date.UTC(y, mo - 1, d));
  dt.setUTCDate(dt.getUTCDate() - 1);
  const yy = dt.getUTCFullYear();
  const mm = String(dt.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(dt.getUTCDate()).padStart(2, '0');
  return `${yy}${mm}${dd}`;
}

function jmaIntensityToScale(label){
  if(label == null) return null;
  const s = String(label).trim();
  const map = {
    '1':10, '2':20, '3':30, '4':40,
    '5弱':45, '5-':45, '5強':50, '5+':50,
    '6弱':55, '6-':55, '6強':60, '6+':60,
    '7':70
  };
  return map[s] != null ? map[s] : null;
}

// 震源地名(Hypocenter文字列)から海域震源かどうかを簡易判定する。
// 「三陸沖」「宮城県沖」のような「〜沖」表記や、「相模湾」「駿河湾」のような「〜湾」、
// その他「海」を含む地名(例:日本海)を海域震源とみなす簡易ヒューリスティック。
// リアルタイム受信データ(WolfX)には海域/内陸を直接示すフラグが無いため、
// テスト配信フォームで明示指定が無い場合のフォールバックとして使う。
function guessIsSeaHypocenter(name){
  if(!name) return false;
  return /(沖|湾|海)/.test(String(name));
}

// WolfXのレスポンスを表示用に正規化する。
// 実際のフィールド名はWolfXのAPI仕様に準拠(Title/CodeType/EventID/Serial/Hypocenter/
// Latitude/Longitude/Magunitude(原文ママ)/Depth/MaxIntensity/WarnArea/isWarn/isFinal/isCancel等)。
// フィールドが欠けているケースにも耐えるよう、参照はすべて安全に行う。
function normalizeEEW(raw){
  if(!raw || !raw.EventID) return null;
  return {
    eventId: String(raw.EventID),
    serial: raw.Serial != null ? String(raw.Serial) : '',
    announcedTime: raw.AnnouncedTime || raw.OriginTime || '',
    originTime: raw.OriginTime || '',
    originTimeMs: parseJstTimeToEpochMs(raw.OriginTime), // TTL判定用(発生時刻からの経過)。パース失敗時はnull
    hypocenter: raw.Hypocenter || '不明',
    magnitude: (typeof raw.Magunitude === 'number') ? raw.Magunitude : (typeof raw.Magnitude === 'number' ? raw.Magnitude : null),
    depth: (typeof raw.Depth === 'number') ? raw.Depth : null,
    maxIntensity: raw.MaxIntensity || '不明',
    // 推定最大長周期地震動階級(1〜4)。実際の配信ソース(WolfX)には現状無いフィールドだが、
    // テスト配信ジェネレータから数値で渡された場合や、将来対応ソースが増えた場合のために
    // raw.LgIntensity(数値)を読み取る。無ければnull(=非表示)。
    lpgmClass: (typeof raw.LgIntensity === 'number') ? raw.LgIntensity : null,
    isWarn: raw.isWarn === true,       // true: 警報(強い揺れが予想される区域あり) / false: 予報
    isFinal: raw.isFinal === true,     // 最終報
    isCancel: raw.isCancel === true,   // 取消
    isAssumption: raw.isAssumption === true, // 仮定震源(震源要素の推定が完了していない)
    isTraining: raw.isTraining === true,     // 訓練報
    // 海域震源かどうか。WolfXの実データには海域/内陸を直接示すフラグが無いため、
    // raw.isSea が明示的に指定されていればそれを優先し(テスト配信フォーム等)、
    // 無ければ震源地名(Hypocenter)に「沖」「海」等が含まれるかで簡易判定する。
    isSea: (raw.isSea === true || raw.isSea === false) ? raw.isSea : guessIsSeaHypocenter(raw.Hypocenter),
    warnArea: Array.isArray(raw.WarnArea) ? raw.WarnArea : [],
    latitude: (typeof raw.Latitude === 'number') ? raw.Latitude : null,
    longitude: (typeof raw.Longitude === 'number') ? raw.Longitude : null,
    receivedAt: Date.now(), // 直近の続報を受信した時刻(一覧の並び替え用。続報のたびに更新される)
    raw
  };
}


// 「地震の発生時刻(OriginTime)から」EEW_TTL_MSを過ぎたエントリを取り除く(5分自動失効)。
// JMAのEEWは発生から5分程度で最終報として扱われる仕様のため、受信時刻ではなく
// 発生時刻を基準に判定する。取消報(isCancel)は取消受信から10秒後に
// scheduleEEWCancelRemovalで別途取り除かれるため、ここでは対象外とする。
function pruneExpiredEEW(){
  const now = Date.now();
  let changed = false;
  let ttlExpired = false; // 5分自動失効(TTL経過)によって取り除かれたエントリがあるか
  for(const [id, evt] of state.eewEvents){
    if(evt.isCancel) continue; // 取消報は専用タイマー(10秒後)で取り除く
    const baseMs = evt.originTimeMs != null ? evt.originTimeMs : evt.receivedAt;
    const isTtlExpired = (now - baseMs) > EEW_TTL_MS;
    if(isTtlExpired){
      state.eewEvents.delete(id);
      changed = true;
      ttlExpired = true;
      if(state.selectedEEWId === id){
        state.selectedEEWId = null;
        clearScaleOnMap();
      }
    }
  }
  if(changed){
    // 5分自動失効(TTL経過)が適用され、他に残っている有効なEEWイベントが無い場合は、
    // EEWタブに留まる意味が薄いため地震情報タブへ自動的に移動する。
    const hasOtherActive = [...state.eewEvents.values()].some(e => !e.isCancel);
    if(ttlExpired && !hasOtherActive && state.activeTab === 'eew'){
      setActiveTab('earthquake');
      return;
    }
    if(state.activeTab === 'eew') renderList();
    // 失効したEEWがWarnAreaの塗り分けに寄与していた可能性があるため、
    // 表示中(EEW/地震情報タブ)なら合算震度を再計算して塗り直す。
    if(state.activeTab === 'eew' || state.activeTab === 'earthquake') renderAllEEWWarnAreaOnMap();
  }
}
setInterval(pruneExpiredEEW, 10000); // 10秒ごとに失効チェック

// 取消報(isCancel)を受信したEEWを、取り消し表示を10秒間見せてから一覧・地図から取り除く。
// 同じEventIDに対して複数回呼ばれても(続報として取消が再送された場合等)タイマーは1本だけ
// 保持されるよう、既存の予約があればクリアしてから再設定する。
const eewCancelRemovalTimers = new Map();
function scheduleEEWCancelRemoval(eventId){
  const existingTimer = eewCancelRemovalTimers.get(eventId);
  if(existingTimer != null) clearTimeout(existingTimer);
  const timer = setTimeout(() => {
    eewCancelRemovalTimers.delete(eventId);
    const evt = state.eewEvents.get(eventId);
    if(!evt || !evt.isCancel) return; // 取消報以外に上書きされていた場合は何もしない
    state.eewEvents.delete(eventId);
    if(state.selectedEEWId === eventId){
      state.selectedEEWId = null;
      clearScaleOnMap();
    }
    if(state.activeTab === 'eew') renderList();
    if(state.activeTab === 'eew' || state.activeTab === 'earthquake') renderAllEEWWarnAreaOnMap();
  }, 10000);
  eewCancelRemovalTimers.set(eventId, timer);
}

// EEWを1件追加/更新する。同じEventID = 同一地震とみなし、既存エントリを上書きする。
//   - 続報の番号(Serial)が既存より古い/同じ場合は無視する(WSの再送や順序前後によって
//     新しい情報が古い情報で巻き戻されるのを防ぐ)
//   - 続報でHypocenter等が欠落している場合は、直前の値を引き継いで表示が欠けないようにする
function upsertEEW(raw){
  const evt = normalizeEEW(raw);
  if(!evt) return;
  if(evt.isTraining) return; // 訓練報は表示対象外

  // 取得元(初期取得・再接続時の配信など)の遅延により、発生時刻(OriginTime)から
  // 既にEEW_TTL_MSを超えている古いEEWが渡されることがある。これをそのまま取り込むと
  // 「一瞬だけ古いEEWが表示されてすぐ消える」ちらつきが起きるため、取り込み前に弾く。
  if(evt.originTimeMs != null && (Date.now() - evt.originTimeMs) > EEW_TTL_MS) return;

  const existing = state.eewEvents.get(evt.eventId);
  if(existing){
    const existingSerial = parseInt(existing.serial, 10);
    const newSerial = parseInt(evt.serial, 10);
    if(!isNaN(existingSerial) && !isNaN(newSerial) && newSerial < existingSerial){
      return; // 既存より古い続報は無視(同一地震=EventIDの時系列を保つ)
    }
    if(evt.hypocenter === '不明' && existing.hypocenter !== '不明') evt.hypocenter = existing.hypocenter;
    if(evt.maxIntensity === '不明' && existing.maxIntensity !== '不明') evt.maxIntensity = existing.maxIntensity;
    if(evt.lpgmClass == null) evt.lpgmClass = existing.lpgmClass;
    if(evt.magnitude == null) evt.magnitude = existing.magnitude;
    if(evt.depth == null) evt.depth = existing.depth;
    if(evt.latitude == null) evt.latitude = existing.latitude;
    if(evt.longitude == null) evt.longitude = existing.longitude;
    if(evt.originTimeMs == null) evt.originTimeMs = existing.originTimeMs;
  }

  // EEWは緊急性が高いため、新規・続報を受信したら地震情報・津波タブを見ている
  // 最中でも強制的にEEWタブへ切り替えて地図も更新する(割り込み表示)。
  // 取消報(isCancel)は「危険が去った」知らせであり緊急に見せる必要性は低いため、
  // タブの割り込みは行わない(表示中なら塗り分けの再計算のみ行う)。
  // 設定でこの自動切り替えをOFFにしている場合は、現在のタブ表示を優先する。
  const shouldInterrupt = settings.autoSwitchTab && state.activeTab !== 'eew';

  if(evt.isCancel){
    // 取消報を受信しても即座には消さず、画像のような「取り消しされました」の
    // オーバーレイを一覧に10秒間表示してから取り除く(removeCancelledEEWAfterDelayで予約)。
    evt.cancelledAt = Date.now();
    state.eewEvents.set(evt.eventId, evt);
    if(state.selectedEEWId === evt.eventId){
      clearScaleOnMap();
    }
    // 取消によってWarnArea合算の内容が変わるため、表示中なら塗り直す。
    if(state.activeTab === 'eew' || state.activeTab === 'earthquake') renderAllEEWWarnAreaOnMap();
    // 他に有効な(取消されていない)EEWが残っていなければ、地震情報タブへ自動的に移動する。
    const hasOtherActive = [...state.eewEvents.values()].some(e => e.eventId !== evt.eventId && !e.isCancel);
    if(!hasOtherActive && state.activeTab === 'eew'){
      setActiveTab('earthquake');
    }
    scheduleEEWCancelRemoval(evt.eventId);
  } else {
    state.eewEvents.set(evt.eventId, evt);
    if(shouldInterrupt) setActiveTab('eew');
    // 新規のEEW、または現在地図に表示中のEEWの続報であれば、地図上の震源表示を自動更新する。
    // (EEWは緊急性が高いため、EEWタブはもちろん地震情報タブを見ている最中でも割り込んで表示する。
    //  ただし津波タブ・設定タブを見ている最中は、そちらの表示を優先し地図を奪わない)
    const canShowOnMap = state.activeTab === 'eew' || state.activeTab === 'earthquake';
    if((!existing || state.selectedEEWId === evt.eventId)){
      state.selectedEEWId = evt.eventId;
      if(canShowOnMap) showEEWOnMap(evt);
    } else if(canShowOnMap){
      // 選択中でない(=他のEEWを見ている)場合でも、震源アイコン以外の合算震度塗り分けは
      // 新しく届いたこのEEWの分も反映されるべきなので再計算だけ行う。
      renderAllEEWWarnAreaOnMap();
    }
    // 受信音・ブラウザ通知は「新規のEEW(このEventIDを初めて受信した時)」のみ発火する。
    // 続報のたびに毎回鳴ると煩わしいため対象外。
    if(!existing){
      playEEWChime();
      showEEWNotification(evt);
    }
  }
  if(state.activeTab === 'eew') renderList();
}

function eewMagLabel(mag){
  if(mag == null || mag < 0) return 'M不明';
  return 'M' + mag.toFixed(1);
}

function eewDepthLabel(depth){
  if(depth == null) return '深さ不明';
  if(depth === 0) return 'ごく浅い';
  return depth + 'km';
}



function renderEEWCard(evt){
  const card = document.createElement('div');
  card.className = 'eew-card' + (state.selectedEEWId === evt.eventId ? ' selected' : '');
  card.dataset.eventId = evt.eventId;

  const kindCls = evt.isWarn ? 'is-warn' : 'is-forecast';
  const kindLabel = evt.isWarn ? '警報' : '予報';

  // 震度帯は震度速報カード(eq-card)と同じ気象庁配色(.s1〜.s7)に統一する。
  // MaxIntensityは"5弱"のような文字列で来るため、既存のscaleInfo()が扱える
  // 10刻みscale値に変換してから使う。見本の表示では、ラベルと値を同じ色帯の中に収める。
  const scale = jmaIntensityToScale(evt.maxIntensity);
  const sInfo = scaleInfo(scale);
  const intensityRowHtml = `
    <div class="eew-intensity-row ${sInfo.cls}">
      <div class="eew-intensity-label">推定最大震度</div>
      <div class="eew-intensity-badge">${sInfo.label}</div>
    </div>
  `;

  // 長周期地震動階級パネル(ジェネレータでの指定、または対応ソースから数値が来た場合のみ表示)
  // 階級ごとに対応する震度の配色(3→s3, 5弱→s5w, 6弱→s6w, 7→s7)を使い、
  // 「震度の文字色に合わせる」形にする(震度バッジ自体の色とは独立)。
  const lpgmClass = evt.lpgmClass;
  const lpgmCls = LPGM_CLASS_TO_SCALE_CLS[lpgmClass] || '';
  const lpgmRowHtml = lpgmClass != null ? `
    <div class="eew-lpgm-row ${lpgmCls}">
      <div class="eew-lpgm-label">推定最大長周期地震動階級</div>
      <div class="eew-lpgm-badge">${lpgmClass}</div>
    </div>
  ` : '';

  const finalBadge = evt.isFinal ? '<span class="eew-final-badge">最終報</span>' : '';

  // 警報区域(WarnArea)は地図上のポリゴン塗り分け(renderEEWWarnAreaOnMap)のみで表現し、
  // サイドバーのカードにはテキスト列挙しない(区域数が多いと冗長になるため)。

  // --- EEWの付加文(a:独立文/b:先頭に付ける文/c:文の後ろに付ける文) ---
  //
  // a: 警報/予報/特別警報の別による独立した定型文。
  //    特別警報(震度6弱以上を含む警報)相当かどうかで文言を切り替える。WolfXからは
  //    特別警報かどうかのフラグが直接来ないため、警報かつ最大予想震度が6弱(55)以上の
  //    場合に特別警報の文言を用いる。
  const isSpecialWarn = evt.isWarn && scale != null && scale >= 55;
  const textA = evt.isWarn
    ? (isSpecialWarn
        ? '緊急地震速報の特別警報です。<br>身の安全を確保してください。'
        : '緊急地震速報です。<br>強い揺れに警戒してください。')
    : '緊急地震速報（予報）です。<br>揺れに注意してください。';

  // b: 仮定震源(isAssumption)の場合のみ先頭に付ける、PLUM法/レベル法の別を示す文。
  //    見分け方: 震度5弱固定 かつ 予報(isWarn===false) → レベル法、それ以外の仮定震源 → PLUM法。
  //    (レベル法は震度5弱固定・予報区分での発表、PLUM法は震度が変動し警報の場合もある)
  let textB = '';
  if(evt.isAssumption){
    const isLevelMethod = (scale === 45) && !evt.isWarn; // 震度5弱固定 & 予報
    textB = isLevelMethod
      ? 'レベル法による仮定震源要素です。'
      : 'PLUM法による仮定震源要素です。';
  }

  // c: 海域地震かつM6.2以上かつ深さ60km以浅の推定の場合のみ、文の後ろに付ける津波注意文。
  //    海域震源かどうか(isSea)はテスト配信フォームでの明示指定を優先し、無ければ
  //    震源地名からの簡易判定(guessIsSeaHypocenter)を使う(normalizeEEWで算出済み)。
  //    仮定震源(isAssumption)はM・深さが未確定のため対象外とする。
  const isTsunamiCaution = !evt.isAssumption && evt.isSea === true
    && evt.magnitude != null && evt.magnitude >= 6.2
    && evt.depth != null && evt.depth <= 60;
  const textC = isTsunamiCaution ? '念のため津波にも注意してください。' : '';

  const eewMessageHtml = `
    ${textB ? `<div class="eew-note-line eew-note-b">${textB}</div>` : ''}
    <div class="eew-note-line eew-note-a">${textA}</div>
    ${textC ? `<div class="eew-note-line eew-note-c">${textC}</div>` : ''}
  `;

  card.innerHTML = `
    <div class="eew-card-head">
      <div class="eew-card-head-title">緊急地震速報</div>
      <div class="eew-kind-tag ${kindCls}">${kindLabel}</div>
    </div>
    <div class="eew-card-sub">${fmtTimeWithSeconds(evt.announcedTime)}${evt.serial ? `　#${evt.serial}` : ''}${finalBadge}</div>
    <div class="eew-card-place">${evt.hypocenter}<span class="eew-card-place-suffix">　で地震</span></div>
    <div class="eew-card-body">
      ${intensityRowHtml}
      ${lpgmRowHtml}
      ${evt.isAssumption ? '' : `
      <div class="eew-stats-row">
        <div class="eew-stat" style="border-color:${magColor(evt.magnitude)};">${eewMagLabel(evt.magnitude)}</div>
        <div class="eew-stat" style="border-color:${depthColor(evt.depth)};">${eewDepthLabel(evt.depth)}</div>
      </div>
      `}
      ${eewMessageHtml}
    </div>
    ${evt.isCancel ? '<div class="eew-cancel-overlay">この緊急地震速報は<br>取り消しされました</div>' : ''}
  `;
  card.style.cursor = 'pointer';
  card.addEventListener('click', () => selectEEW(evt.eventId));
  return card;
}

// 最新の続報(serial番号が大きい方)が先頭に来るよう並べる。serialが数値化できない場合は
// 受信時刻(receivedAt)で代用する。
function renderEEWList(){
  listEl.innerHTML = '';
  const list = [...state.eewEvents.values()].sort((a, b) => {
    const sa = parseInt(a.serial, 10);
    const sb = parseInt(b.serial, 10);
    if(!isNaN(sa) && !isNaN(sb) && sa !== sb) return sb - sa;
    return b.receivedAt - a.receivedAt;
  });
  if(list.length === 0){
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.textContent = EMPTY_STATE_TEXT.eew;
    listEl.appendChild(empty);
    return;
  }
  const frag = document.createDocumentFragment();
  for(const evt of list){
    frag.appendChild(renderEEWCard(evt));
  }
  listEl.appendChild(frag);
}

// EEWの震源(Latitude/Longitude)を地図上に表示する。
// p2pquakeの地震情報と違い観測点別の震度は配信されないため、震源アイコンのみを表示し、
// カメラもその地点へ寄せる。震源が不明/未取得(推定中の仮定震源で座標が無い等)の場合は
// 既存の表示をクリアするだけにとどめる。
// 予想震度の塗り分け(WarnArea)は選択中の1件だけでなく、現在有効な全EEWをまとめて
// 表示する(renderAllEEWWarnAreaOnMap)。震源アイコン・PS円は選択中のEEWを主役として表示する。
function showEEWOnMap(evt){
  if(!mapReady){ onMapReady(() => showEEWOnMap(evt)); return; }
  clearScaleOnMap(); // 震度分布・観測点は地震情報側の表示のため、EEW表示時はクリアしておく(PS円もここで一旦停止する)
  const hypSrc = map.getSource('hypocenter');
  const valid = evt && isValidLatLng(evt.latitude, evt.longitude);
  if(hypSrc){
    hypSrc.setData({
      type:'FeatureCollection',
      features: valid ? [{ type:'Feature', geometry:{type:'Point', coordinates:[evt.longitude, evt.latitude]}, properties:{kind: evt.isAssumption ? 'eew-assumption' : 'eew'} }] : []
    });
  }
  if(valid && settings.autoFlyTo){
    map.flyTo({ center:[evt.longitude, evt.latitude], zoom: Math.max(map.getZoom(), 6), duration:800 });
  }
  // --- 警報区域(WarnArea)の推定震度を塗り分け(現在有効な全EEWをまとめて表示) ---
  renderAllEEWWarnAreaOnMap();
  // --- PS円(P波・S波到達円)のアニメーション開始 ---
  // EEWは発生直後(震源要素が仮定中のことも多い)に配信されるため、地震情報(551)よりも
  // むしろPS円の実用性が高い。座標と発生時刻(originTime)が取得できていれば表示する。
  // PLUM法・レベル法などの仮定震源(isAssumption)であっても、仮定された震源座標と
  // 発生時刻からP波・S波の伝播円を描く演出自体は成立するため、規模(M)未確定を理由に
  // PS円を止めるのは過剰な制限だった(実装上、深さ未確定時はstartPSCircleAnimation側で
  // depthKm||0 にフォールバックされる)。仮定震源でもPS円を描画する。
  if(valid && evt.originTime){
    startPSCircleAnimation(evt.latitude, evt.longitude, evt.depth, evt.originTime);
  }
}

// EEWカードのクリック選択。地震情報のカード選択(selectEvent)と同様、
// 選択中カードのハイライトと地図表示の更新を行う。
function selectEEW(eventId){
  state.selectedEEWId = eventId;
  document.querySelectorAll('.eew-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.eventId === eventId);
  });
  const evt = state.eewEvents.get(eventId);
  if(evt) showEEWOnMap(evt);
}

function eventsForTab(tab){
  if(tab === 'earthquake'){
    // 追加読み込み(/v2/history や /v2/jma/quake)は基本的に新しい順で返るためpush順に
    // 依存しても大抵は保たれるが、ページ境界の取りこぼしやマージ処理の前後関係によって
    // まれに順序が崩れることがある。表示直前に必ずtime降順で並べ直すことで、
    // データ取得側の細かい前後関係に関わらず一覧の時系列を保証する。
    return sortedEarthquakeEvents();
  }
  return []; // eewは今後実装予定のため常に空
}

// state.events(挿入順)から地震(551)のみを取り出し、発生時刻(time)の新しい順に並べる。
// 一覧表示(eventsForTab)・デフォルト選択(selectLatestEarthquakeByDefault)・
// 履歴補完後の選択追従(fillGapFromHistory)など、「一覧の先頭=最新の地震」を
// 前提とする箇所は必ずこれを使う。state.events自体はunshift/マージの都合で
// 挿入順と表示順(時系列順)が食い違うことがあるため、配列先頭を直接見てはいけない。
function sortedEarthquakeEvents(){
  return state.events
    .filter(e => e.type === 'earthquake')
    .slice()
    .sort((a, b) => (Date.parse(b.time) || 0) - (Date.parse(a.time) || 0));
}

const EMPTY_STATE_TEXT = {
  earthquake: '情報を取得しています…',
  eew: '発表中の緊急地震速報はありません',
  tsunami: '発表中の津波情報はありません'
};

// 津波情報は「発表するたびに全区域まとめて配信される」性質上、地震情報のように
// 過去の発表を1件ずつ選択させるカード一覧ではなく、現在発表中の状況を種別
// (階級)・高さ・範囲でまとめたサマリーパネル(renderTsunamiSummary)で表示する。
// EEWは複数件が同時に発表されうるため、EventIDごとに保持したstate.eewEventsを
// renderEEWListで一覧表示する。
function renderList(){
  if(state.activeTab === 'settings') return; // 設定タブは静的パネル(#settings-panel)を表示するのみで、一覧描画は不要
  if(state.activeTab === 'tsunami'){
    renderTsunamiSummary();
    return;
  }
  if(state.activeTab === 'eew'){
    renderEEWList();
    return;
  }
  listEl.innerHTML = '';
  const list = eventsForTab(state.activeTab);
  if(list.length === 0){
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.textContent = EMPTY_STATE_TEXT[state.activeTab] || '情報がありません';
    listEl.appendChild(empty);
    return;
  }
  const frag = document.createDocumentFragment();
  for(const evt of list){
    frag.appendChild(renderEventCard(evt));
  }
  listEl.appendChild(frag);

  if(state.activeTab === 'earthquake'){
    const footer = document.createElement('div');
    footer.className = 'list-footer';
    footer.id = 'list-footer';
    footer.textContent = state.jmaExhausted
      ? 'これ以上過去の情報はありません'
      : '';
    listEl.appendChild(footer);
  }
}

// タブ切り替えUIの初期化
const tabBarEl = document.getElementById('tab-rail');
const settingsPanelEl = document.getElementById('settings-panel');
function setActiveTab(tab){
  state.activeTab = tab;
  tabBarEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  // 設定タブは一覧(#event-list)ではなく専用の静的パネル(#settings-panel)を表示する
  const isSettings = tab === 'settings';
  listEl.hidden = isSettings;
  settingsPanelEl.hidden = !isSettings;
  renderList();
  syncMapOverlayToTab(); // タブごとに地図上へ出す情報(震度分布/EEW震源/津波区域)を出し分ける
}
tabBarEl.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
});

// マージ判定の探索対象を直近のイベントのみに限定する件数。
// 無限スクロールでstate.eventsには数百〜数千件の過去ログが積まれうるが、
// マージは「同じ地震が段階を追って更新される」ケースのみを対象とすべきで、
// 全件を対象に探索すると、同じ震央地名(例:「福島県沖」等の頻発地域)を持つ
// 何日も前の別地震が、たまたま新着の地震情報と誤ってマージされてしまう
// (destination段階の"old"がリストの奥深くに埋もれていても見つかってしまうため)。
// 実運用上、段階間の更新は数分〜数十分以内に来るため、直近数十件を見れば十分。
const MERGE_SEARCH_LIMIT = 30;

// 震源(震央地名)が同一かどうかを判定する。
// p2pquakeのhypocenter.nameは「駿河湾」「福島県沖」のような気象庁の震央地名がそのまま入るため、
// 文字列一致で十分同一震源とみなせる。"不明"同士は誤マージを避けるため一致とみなさない。
// 注意: これ単体では同一地震の判定として不十分(同じ地名は繰り返し使われるため)。
// 必ず発生時刻(time)の一致とセットで使うこと。
function normalizePlaceName(place){
  // 全角スペースを半角に統一した上でtrimする。p2pquakeは段階によって
  // 震央地名の前後に空白が付く/付かないケースがあり、厳密な === 比較だと
  // 見た目上同じ地名でも別地震と誤判定され、マージが機能しない原因になっていた。
  return String(place).replace(/\u3000/g, ' ').trim();
}
function sameHypocenter(placeA, placeB){
  if(!placeA || !placeB) return false;
  const a = normalizePlaceName(placeA);
  const b = normalizePlaceName(placeB);
  if(a === '不明' || b === '不明') return false;
  if(a === b) return true;
  // 段階によって「福島県会津」→「福島県会津地方」のように地方表記の有無で
  // 揺れることがあるため、短い方が長い方の先頭に一致する場合も同一震源とみなす。
  const shorter = a.length <= b.length ? a : b;
  const longer  = a.length <= b.length ? b : a;
  return shorter.length >= 2 && longer.startsWith(shorter);
}

// 発生時刻(time)が同一かどうかを判定する。
// 文字列としての表記ゆれ(タイムゾーン表記や書式の違いなど)を吸収するため、
// パース後のエポックms値どうしを比較する。値が完全一致する場合のみ同一発生とみなす
// (時刻のズレを許容すると、たまたま近い時刻に発生した別の地震まで誤って
// マージしてしまうため、許容範囲は設けない)。
function sameOriginTime(timeA, timeB){
  if(!timeA || !timeB) return false;
  const a = parseJstTimeToEpochMs(timeA);
  const b = parseJstTimeToEpochMs(timeB);
  if(a == null || b == null) return timeA === timeB; // パース失敗時は文字列一致にフォールバック
  return a === b;
}

// 段階の並び順(数値が大きいほど後の段階)。同じ段階の続報や、段階が進んだ場合の
// マージ判定に使う。逆行(新しい方が古い段階)へのマージは行わない。
const STAGE_ORDER = { prompt: 0, destination: 1, detail: 2 };

// 新しく来た地震情報(newEvt)を、既存イベント一覧の中から「同一地震」とみなせるものと
// マージすべきか判定する。マージ対象が見つかればそのインデックスを、なければ -1 を返す。
// 探索は直近MERGE_SEARCH_LIMIT件のみ(理由は上記コメント参照)。
//
// 判定ルール: 同一地震とみなす条件は「発生時刻(time)が近接していること」を必須とし、
// 加えて段階がdestination以降(震源が確定している段階)同士の組み合わせでは、
// 震央地名の一致も必須にする(震度速報同士・震度速報からの遷移は震源未確定のため地名を見ない)。
//   - prompt     -> prompt              : 続報(震度が更新された第2報以降)
//   - prompt     -> destination/detail  : 震源が確定した段階への遷移
//   - destination -> destination        : 震源情報の続報(震央や規模が更新される場合がある)
//   - destination -> detail             : 震度情報が追加される段階への遷移
//   - detail     -> detail              : 地震情報の続報(観測点の震度が更新される場合がある)
// 段階が退行する組み合わせ(例: 既にdetailまで来ているのにdestinationが来た)はマージしない
// (別の地震である可能性の方が高いため、上書きで情報を失うより新規カードとして残す)。
function findMergeTargetIndex(newEvt){
  if(newEvt.type !== 'earthquake') return -1;
  const newOrder = STAGE_ORDER[newEvt.stage];
  const limit = Math.min(state.events.length, MERGE_SEARCH_LIMIT);
  for(let i = 0; i < limit; i++){
    const old = state.events[i];
    if(old.type !== 'earthquake') continue;
    if(old.id === newEvt.id) continue;

    const oldOrder = STAGE_ORDER[old.stage];
    if(oldOrder == null || newOrder == null) continue;
    if(newOrder < oldOrder) continue; // 段階の退行はマージ対象にしない

    if(sameOriginTime(old.time, newEvt.time)){
      // destination以降(震源確定後)の段階同士では、震央地名の一致も必須にする
      // (promptは震源未確定"不明"のことが多く、地名判定に使えないため対象外)
      if(oldOrder >= STAGE_ORDER.destination && newOrder >= STAGE_ORDER.destination){
        if(!sameHypocenter(old.place, newEvt.place)) continue;
      }
      return i;
    }

    // フォールバック: detail(地震情報)同士に限り、time文字列のパース失敗や
    // 想定外のずれで時刻近接判定が通らなかった場合でも、震央地名が完全一致していれば
    // 同一地震の続報とみなす。既にリストに存在する地震が、古いログ取得(/v2/jma/quake)
    // 由来の時刻表記ゆれによって重複カードとして再表示されるのを防ぐための保険。
    // destination以下は震源未確定/変動の余地があり誤マージのリスクが高いため対象外。
    if(oldOrder === STAGE_ORDER.detail && newOrder === STAGE_ORDER.detail){
      if(old.place && newEvt.place && old.place !== '不明' && newEvt.place !== '不明' &&
         normalizePlaceName(old.place) === normalizePlaceName(newEvt.place)){
        return i;
      }
    }
  }
  return -1;
}

// 段階に応じて、マージ元(old)からマージ先(newEvt)へ情報を引き継ぐ。
//   震度速報 -> 震度速報            : 何も引き継がない(新しい震度速報の内容でそのまま置き換える)
//   震度速報 -> 震源情報/地震情報   : 各地の震度(points)・最大震度(maxScale)を引き継ぐ
//     (震源情報には震度分布が含まれないため、直接detailに遷移した場合も含めて引き継ぐ)
//   震源情報 -> 震源情報(続報)      : 何も引き継がない(新しい震源情報が常に最新かつ上位互換)
//   震源情報 -> 地震情報            : 何も引き継がない
//   地震情報 -> 地震情報(続報)      : 何も引き継がない
function mergeEventInfo(old, newEvt){
  if(old.stage === 'prompt' && (newEvt.stage === 'destination' || newEvt.stage === 'detail')){
    // 震源情報/地震情報には震度分布が含まれないケースがあるため、震度速報のpoints/maxScaleを
    // 引き継いで地図上の震度塗り分けが失われないようにする。
    if((!newEvt.raw.points || newEvt.raw.points.length === 0) && old.raw.points && old.raw.points.length > 0){
      newEvt.raw = { ...newEvt.raw, points: old.raw.points };
    }
    if(newEvt.maxScale == null && old.maxScale != null){
      newEvt.maxScale = old.maxScale;
      newEvt.raw = { ...newEvt.raw, earthquake: { ...newEvt.raw.earthquake, maxScale: old.maxScale } };
    }
  }
  // それ以外の組み合わせ(prompt->prompt, destination->destination, destination->detail,
  // detail->detail)は引き継ぎなし。newEvtは常にoldと同じか後の段階の"より新しい発表"であり、
  // 既存の情報を上書きしても内容が失われることはないため。
  return newEvt;
}

// 過去ログ(appendOlderEvent)専用のマージ探索。
// findMergeTargetIndexはWS新着(先頭挿入)を前提に「リスト先頭側」を探索するが、
// 過去ログは逆に末尾側に積んでいくため、直近で末尾に追加したイベントの近傍
// (末尾からHISTORY_MERGE_SEARCH_LIMIT件)を探索対象にする。
// 判定ルール自体(段階順・発生時刻近接・震央地名一致)はfindMergeTargetIndexと共通。
const HISTORY_MERGE_SEARCH_LIMIT = 30;
function findHistoryMergeTargetIndex(newEvt){
  if(newEvt.type !== 'earthquake') return -1;
  const newOrder = STAGE_ORDER[newEvt.stage];
  const from = Math.max(0, state.events.length - HISTORY_MERGE_SEARCH_LIMIT);
  for(let i = state.events.length - 1; i >= from; i--){
    const old = state.events[i];
    if(old.type !== 'earthquake') continue;
    if(old.id === newEvt.id) continue;

    const oldOrder = STAGE_ORDER[old.stage];
    if(oldOrder == null || newOrder == null) continue;

    if(!sameOriginTime(old.time, newEvt.time)) continue;

    // 過去ログはページ内で新しい順に来るため、oldの方がnewEvtより後の段階のことも普通にある。
    // ここでは段階の退行チェックはせず(WS新着向けfindMergeTargetIndexと異なる点)、
    // 両者がdestination以上の段階同士のときだけ震央地名の一致も必須にする。
    if(oldOrder >= STAGE_ORDER.destination && newOrder >= STAGE_ORDER.destination){
      if(!sameHypocenter(old.place, newEvt.place)) continue;
    }

    return i;
  }
  return -1;
}

// 無限スクロールでの過去ログ追加専用。addEventと違い:
//   - 常にリスト末尾(=最も古い側)付近にマージ/追加する(先頭挿入は行わない)
//   - 同一地震の段階違い(震度速報→震源情報→地震情報)が別カードのまま残らないよう、
//     末尾付近の近傍イベントとマージ判定を行う(修正前は判定自体が無く、
//     ページ内に複数段階が混在すると別カードとして積み上がっていた)
//   - 選択状態や地図表示、津波レイヤーには一切影響しない(表示中の「現在」を乱さないため)
//   - renderListもここでは呼ばない(1ページ=最大100件をまとめて追加するため、
//     呼び出し側で全件追加後に1回だけ呼ぶ)
// 戻り値: 実際に追加できた件数(重複を除いた数。マージのみの場合も1を返す)
function appendOlderEvent(raw){
  const evt = normalizeEvent(raw);
  if(!evt) return 0;
  if(state.seenIds.has(evt.id)) return 0; // 既に読み込み済み(重複)
  state.seenIds.add(evt.id);

  const mergeIdx = findHistoryMergeTargetIndex(evt);
  if(mergeIdx !== -1){
    const existing = state.events[mergeIdx];
    // mergeEventInfo(old, newEvt)は「oldが古い段階・newEvtが新しい段階」を前提とするため、
    // ページ内の並び順(新しい順)に関わらず、実際の段階順で引数を揃えてから渡す。
    const existingOrder = STAGE_ORDER[existing.stage];
    const evtOrder = STAGE_ORDER[evt.stage];
    const [olderStage, newerStage] = evtOrder < existingOrder ? [evt, existing] : [existing, evt];
    const merged = mergeEventInfo(olderStage, newerStage);
    // 同一地震とみなし、古いカードは残さず1件のみ(既存カードの位置)にまとめる
    state.events.splice(mergeIdx, 1, merged);
    if(state.selectedId === existing.id) state.selectedId = merged.id;
  } else {
    state.events.push(evt); // 末尾に追加
  }
  return 1;
}

// source: 'ws'(WebSocket配信) | 'history'(履歴API/初期・再接続時の補完)
// WebSocketで到着した地震イベント(551)は、ユーザーが他のカードを選択中でも
// 強制的にそのイベントへ選択を切り替え、地図表示も追従させる。
// (履歴補完で流れる過去イベントでは選択を奪わない)
function addEvent(raw, source){
  const evt = normalizeEvent(raw);
  if(!evt) return;
  if(state.seenIds.has(evt.id)) return; // 重複防止
  state.seenIds.add(evt.id);

  let mergedFromLive = false; // WSで来た同一地震のマージ更新か
  const mergeIdx = findMergeTargetIndex(evt);
  if(mergeIdx !== -1){
    const old = state.events[mergeIdx];
    const merged = mergeEventInfo(old, evt);
    if(source === 'ws'){
      // WS新着によるマージ更新は、そのイベントが文字通り「今起きた最新情報」なので
      // リスト先頭へ移動させる(震度速報→震源情報→地震情報の段階更新を追いかける形)。
      state.events.splice(mergeIdx, 1);
      state.events.unshift(merged);
    } else {
      // 履歴読み込み(fetchHistory)由来のマージは、対象イベント自体は過去のものであり
      // 「今新しく発生した」わけではない。ここでunshiftしてしまうと、たまたま後から処理された
      // 古い地震が新しい地震より上に来てしまい、時系列が崩れる(リロードを繰り返すと
      // 発生するバグの原因だった)。マージ後もリスト内の元の位置にそのまま留める。
      state.events[mergeIdx] = merged;
    }
    if(state.selectedId === old.id) state.selectedId = merged.id;
    mergedFromLive = (source === 'ws');
  } else {
    state.events.unshift(evt); // 最新を先頭に(fetchHistoryは古い順に処理するため、
    // 繰り返しunshiftすることで最終的に新しい順の並びになる)
  }
  renderList();

  // WebSocketで届いた新着(地震情報・津波情報)は、EEWと同様に緊急性が高い情報のため、
  // 他のタブを見ていても設定(autoSwitchTab)がONなら該当タブへ強制的に切り替える(割り込み表示)。
  // 履歴補完(source==='history')や、すでに同じタブを見ている場合は切り替えない。
  if(source === 'ws' && settings.autoSwitchTab && state.activeTab !== evt.type){
    setActiveTab(evt.type);
  }

  // 津波イベントなら発表区域マップを更新してレイヤーに反映
  // (latestTsunamiAreasは常に最新化しておく。updateTsunamiLayer自体は軽量な
  //  setDataのみのため、タブ表示中でなくても呼んでおき、後でタブに戻った時に
  //  古い状態のまま止まらないようにする)
  if(evt.type === 'tsunami'){
    latestTsunamiAreas = new Map();
    for(const a of evt.areas){
      if(a.grade) latestTsunamiAreas.set(a.name, a.grade);
    }
    updateTsunamiLayer();
    renderTsunamiHypocenterOnMap(evt);
  }

  // マージによって選択中イベントの中身が更新された場合は地図表示も更新する
  // (地震情報タブを見ている時のみ。他タブ表示中に地図が勝手に切り替わらないようにする)
  if(state.selectedId === evt.id && evt.type === 'earthquake' && state.activeTab === 'earthquake'){
    renderScaleOnMap(evt.raw);
  }

  // WebSocket配信で来た「地震情報」は、それが実際に最新の地震である場合に限り選択を切り替える。
  // 新規到着はもちろん、既存カードへのマージ更新(震度速報→震源情報→地震情報 等の段階更新)でも
  // 同様に扱うが、段階更新の配信タイミングは発生時刻の新しい順とは限らない(既に発表済みの
  // 別の地震より後から詳細情報が届くことがある)ため、発生時刻(sortedEarthquakeEvents)で
  // 見て本当に一覧の先頭に来るものだけを自動選択の対象にする。そうでない場合は、より新しい
  // 地震が既に選択されている状態を優先し、選択を奪わない。
  if(source === 'ws' && evt.type === 'earthquake'){
    const latestEarthquake = sortedEarthquakeEvents()[0];
    const isActuallyLatest = latestEarthquake && latestEarthquake.id === evt.id;
    if(isActuallyLatest && (state.selectedId !== evt.id || mergedFromLive)){
      selectEvent(evt.id);
    }
  }
}

function selectEvent(id){
  state.selectedId = id;
  document.querySelectorAll('.eq-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id);
  });
  const evt = state.events.find(e => e.id === id);
  if(!evt) return;
  // 地図への描画は「地震情報タブを見ている時」だけ行う。EEW/津波/設定タブを見ている
  // 最中に新しい地震情報が届いても、地図上の表示(震度分布・観測点)を勝手に上書きしない。
  if(state.activeTab !== 'earthquake') return;
  if(evt.type === 'earthquake'){
    renderScaleOnMap(evt.raw);
  } else {
    clearScaleOnMap();
  }
}



// 気象庁「気象情報の配色に関する設定指針」(2012年5月)に準拠
// 大津波警報:赤紫(180,0,104) 津波警報:赤(255,40,0) 津波注意報:黄(250,245,0)
const TSUNAMI_GRADE_COLOR = {
  MajorWarning: 'rgb(180,0,104)',
  Warning: 'rgb(255,40,0)',
  Watch: 'rgb(250,245,0)'
};

// 最新の津波イベント(code:552)から発表中区域を保持
let latestTsunamiAreas = null; // Map<name, grade>

function updateTsunamiLayer(){
  if(!mapReady){ onMapReady(updateTsunamiLayer); return; }
  const src = map.getSource('tsunami-forecast');
  if(!src || !window.__tsunamiFeatures) return;

  if(!latestTsunamiAreas || latestTsunamiAreas.size === 0){
    src.setData({type:'FeatureCollection', features: window.__tsunamiFeatures.map(f => ({...f, properties:{...f.properties}}))});
    return;
  }
  const features = window.__tsunamiFeatures.map(f => {
    const grade = latestTsunamiAreas.get(f.properties.name);
    const color = grade ? (TSUNAMI_GRADE_COLOR[grade] || TSUNAMI_GRADE_COLOR.Watch) : undefined;
    const props = {...f.properties};
    if(color){ props.color = color; props.grade = grade; }
    else { delete props.color; delete props.grade; }
    return {...f, properties: props};
  });
  // 危険度が高い等級(大津波警報 > 警報 > 注意報)ほど後ろ(=前面)に描画されるよう並べ替える
  features.sort((a, b) => tsunamiGradeRank(a.properties.grade) - tsunamiGradeRank(b.properties.grade));
  src.setData({type:'FeatureCollection', features});
}



let map = null;
let mapReady = false;
const pendingMapTasks = [];
function onMapReady(fn){
  if(mapReady) fn(); else pendingMapTasks.push(fn);
}

function initMap(){
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {},
      layers: [],
      glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf'
    },
    center: [138.5, 37.0],
    zoom: 4.4,
    minZoom: 2,
    maxZoom: 8.5,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl({showCompass:false}), 'top-right');

  map.on('load', async () => {
    // --- 背景(海) ---
    map.addLayer({
      id:'background', type:'background',
      paint:{ 'background-color':'#182231' }
    });

    // geojsonは全て並列でfetch開始(eq_saibun.geojsonを最優先で処理するため待ち順を分離)
    const saibunPromise = fetch('./eq_saibun.geojson').then(r => r.json());
    const worldPromise = fetch('./world.geojson').then(r => r.json());
    const tsunamiPromise = fetch('./tsunami_forecast.geojson').then(r => r.json());

    // --- 震度細分区域(境界)を最優先で表示 ---
    const saibun = await saibunPromise;
    window.__saibunFeatures = saibun.features;
    map.addSource('saibun', {type:'geojson', data: saibun});
    map.addLayer({
      id:'saibun-fill', type:'fill', source:'saibun',
      paint:{ 'fill-color':'#4D5367', 'fill-opacity':1 }
    });
    map.addLayer({
      id:'saibun-line', type:'line', source:'saibun',
      paint:{ 'line-color':'#6C7288', 'line-width':0.7 }
    });
    // 震度色オーバーレイ(選択イベントの区域ごと最大震度)
    map.addSource('saibun-scale', {type:'geojson', data: {type:'FeatureCollection', features:[]}});
    map.addLayer({
      id:'saibun-scale-fill', type:'fill', source:'saibun-scale',
      paint:{ 'fill-color': ['get','color'], 'fill-opacity':0.85 }
    });
    map.addLayer({
      id:'saibun-scale-line', type:'line', source:'saibun-scale',
      paint:{ 'line-color':'#12131a', 'line-width':0.8 }
    });

    // EEW警報区域の推定震度オーバーレイ(WolfXのWarnAreaを区域ごとに塗り分け)。
    // 確定した震度分布(saibun-scale)とは別レイヤーにし、EEW表示時のみ使う。
    // まだ「推定」段階の情報であることを見た目でも区別するため、確定震度より塗りを薄くしている。
    map.addSource('eew-warnarea-scale', {type:'geojson', data: {type:'FeatureCollection', features:[]}});
    map.addLayer({
      id:'eew-warnarea-scale-fill', type:'fill', source:'eew-warnarea-scale',
      paint:{ 'fill-color': ['get','color'], 'fill-opacity':0.65 }
    });
    map.addLayer({
      id:'eew-warnarea-scale-line', type:'line', source:'eew-warnarea-scale',
      paint:{ 'line-color':'#12131a', 'line-width':0.8 }
    });

    // --- 世界地図(海外の陸地)。既存レイヤーの下に挿入して重ね順を保つ ---
    const world = await worldPromise;
    map.addSource('world', {type:'geojson', data: world});
    map.addLayer({
      id:'world-fill', type:'fill', source:'world',
      paint:{ 'fill-color':'#4D5367', 'fill-opacity':1 }
    }, 'saibun-fill');
    map.addLayer({
      id:'world-line', type:'line', source:'world',
      paint:{ 'line-color':'#6C7288', 'line-width':0.6 }
    }, 'saibun-fill');

    // --- 津波予報区(発表中の区域のみ着色。常時重ねて表示) ---
    const tsunamiGeo = await tsunamiPromise;
    window.__tsunamiFeatures = tsunamiGeo.features;
    buildTsunamiAreaCentersFromFeatures(tsunamiGeo.features);
    populateTsunamiAreaSelectOptions();
    map.addSource('tsunami-forecast', {type:'geojson', data: tsunamiGeo});
    map.addLayer({
      id:'tsunami-forecast-line', type:'line', source:'tsunami-forecast',
      layout:{
        'line-join': 'round',
        'line-cap': 'round'
      },
      paint:{
        'line-color': ['coalesce', ['get','color'], 'rgba(0,0,0,0)'],
        'line-width': ['match', ['get','grade'], 'MajorWarning', 10, 5],
        'line-blur': 0.6,
        'line-opacity': ['case', ['has','color'], 0.95, 0]
      }
    });

    // --- 観測点(イベント選択時のみ表示) ---
    // 震度アイコン(icons_data.js の ICON_DATA_URIS)をmapに画像として登録
    // 元データは457x457のSVGだが、実際の表示サイズはicon-sizeの最大値(zoom12で0.42)でも
    // 高々200px程度にしかならず、457pxのまま焼くとGPUテクスチャ/スプライトアトラスが
    // 無駄に肥大化して描画が重くなる原因になっていた。128px相当まで縮小した上で、
    // Retinaディスプレイでのぼやけを防ぐためpixelRatioを明示して登録する。
    const iconPixelRatio = Math.min(window.devicePixelRatio || 1, 2);
    await Promise.all(Object.entries(ICON_DATA_URIS).map(([key, dataUri]) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          if(!map.hasImage(`quake-icon-${key}`)){
            map.addImage(`quake-icon-${key}`, img, { pixelRatio: iconPixelRatio });
          }
          resolve();
        };
        img.onerror = resolve;
        img.src = dataUri;
      });
    }));

    map.addSource('stations', {type:'geojson', data: {type:'FeatureCollection', features:[]}});
    map.addLayer({
      id:'stations-circle', type:'symbol', source:'stations',
      layout:{
        'icon-image': ['concat', 'quake-icon-', ['get','key']],
        // 'interpolate'は現在のズーム値に対して毎フレーム再計算が走るため、
        // fitBoundsのカメラアニメーション中(observation点が多いと数百件)は
        // これがボトルネックになりやすい。'step'に切り替えて計算コストを抑えつつ、
        // 段階を細かめ(5段階)に取ることで見た目のガクツキも抑えている。
        // 457px->128pxへの画像縮小補正(約3.57倍)込みの値。
        'icon-size': [
          'step', ['zoom'],
          0.571,
          5, 0.680,
          7, 0.890,
          9.5, 1.142,
          11, 1.320
        ],
        'icon-allow-overlap': true,
        'icon-ignore-placement': true,
        // icon-allow-overlap:trueの場合、sort-keyが大きいほど前面に描画される
        'symbol-sort-key': ['get', 'scaleOrder']
      }
    });

    // --- 震源アイコン(縁取り付きの赤い×印、Canvasで生成) ---
    // 従来は赤一色のためダークな地図背景や震度ポリゴンの色に埋もれて視認しづらかった。
    // 太めの縁取りを下地に描いてから赤い×を重ねることで、どの背景色の上でも視認できるようにする。
    // 地震情報(quake-hypocenter-eq)は黄色フチ、EEW(quake-hypocenter-eew)は白フチと、
    // 用途によって縁取り色を分けて視覚的に区別できるようにしている。
    function buildHypocenterIcon(outlineColor){
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const pad = 13;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // 縁取り(下地)
      ctx.strokeStyle = outlineColor;
      ctx.lineWidth = 15;
      ctx.beginPath();
      ctx.moveTo(pad, pad); ctx.lineTo(size - pad, size - pad);
      ctx.moveTo(size - pad, pad); ctx.lineTo(pad, size - pad);
      ctx.stroke();
      // 赤い×(前面)
      ctx.strokeStyle = '#ff2d2d';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(pad, pad); ctx.lineTo(size - pad, size - pad);
      ctx.moveTo(size - pad, pad); ctx.lineTo(pad, size - pad);
      ctx.stroke();
      return ctx.getImageData(0, 0, size, size);
    }
    map.addImage('quake-hypocenter-eq', buildHypocenterIcon('#ffe600'));   // 地震情報: 黄色フチ(津波の震源表示もこれを共用)
    map.addImage('quake-hypocenter-eew', buildHypocenterIcon('#ffffff')); // EEW: 白フチ

    // --- 仮定震源アイコン(ドーナツ型の丸、赤リング+白ふち、Canvasで生成) ---
    // 仮定震源(震源要素が推定中でMagunitude/Depthが未確定)のEEWは、通常のEEW震源(×印・白フチ)と
    // 見た目で区別できるよう、中心に穴の空いたドーナツ型の丸アイコンを採用する。
    // 配色は通常のEEW震源アイコンと同じ「赤(#ff2d2d)に白ふち」とし、
    // キャンバスサイズ・縁取りの太さも通常アイコンに合わせる。
    function buildAssumptionHypocenterIcon(){
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size / 2, cy = size / 2;
      const outlineWidth = 5;   // 白フチ(内側・外側それぞれの縁取りの太さ)
      const ringWidth = 10;     // 赤いリング本体の太さ
      const outerRadius = 20;   // リング外周の半径
      const innerRadius = outerRadius - ringWidth; // リング内周(=穴)の半径
      // 外側の白フチ
      ctx.beginPath();
      ctx.arc(cx, cy, outerRadius + outlineWidth / 2, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = outlineWidth;
      ctx.stroke();
      // 内側(穴のフチ)の白フチ
      ctx.beginPath();
      ctx.arc(cx, cy, innerRadius - outlineWidth / 2, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = outlineWidth;
      ctx.stroke();
      // 赤いリング本体(中心は塗りつぶさず穴を空ける)
      ctx.beginPath();
      ctx.arc(cx, cy, (outerRadius + innerRadius) / 2, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff2d2d';
      ctx.lineWidth = ringWidth;
      ctx.stroke();
      return ctx.getImageData(0, 0, size, size);
    }
    map.addImage('quake-hypocenter-eew-assumption', buildAssumptionHypocenterIcon()); // EEW(仮定震源): ドーナツ型・赤リング+白フチ

    map.addSource('hypocenter', {type:'geojson', data: {type:'FeatureCollection', features:[]}});
    map.addLayer({
      id:'hypocenter-icon', type:'symbol', source:'hypocenter',
      layout:{
        'icon-image': ['match', ['get', 'kind'],
          'eew', 'quake-hypocenter-eew',
          'eew-assumption', 'quake-hypocenter-eew-assumption',
          'quake-hypocenter-eq'
        ],
        'icon-size': [
          'interpolate', ['linear'], ['zoom'],
          4, 0.3,
          6, 0.4,
          9, 0.55,
          12, 0.7
        ],
        'icon-allow-overlap': true,
        'icon-ignore-placement': true
      }
    });

    // --- PS円(P波・S波到達円のアニメーション表示) ---
    // 選択中の地震について、発生時刻からの経過時間に応じてP波面(青)・S波面(赤)が
    // 震源から同心円状に広がっていく様子を表示する。円のGeoJSONはJS側(updatePSCircles)で
    // 毎フレーム再計算してsetDataする。
    map.addSource('ps-circle-p', {type:'geojson', data: {type:'FeatureCollection', features:[]}});
    map.addSource('ps-circle-s', {type:'geojson', data: {type:'FeatureCollection', features:[]}});
    map.addLayer({
      id:'ps-circle-p-fill', type:'fill', source:'ps-circle-p',
      paint:{ 'fill-color':'#3b82f6', 'fill-opacity':0.08 }
    });
    map.addLayer({
      id:'ps-circle-p-line', type:'line', source:'ps-circle-p',
      paint:{ 'line-color':'#3b82f6', 'line-width':2.2, 'line-opacity':0.9 }
    });
    map.addLayer({
      id:'ps-circle-s-fill', type:'fill', source:'ps-circle-s',
      paint:{ 'fill-color':'#ff3b30', 'fill-opacity':0.08 }
    });
    map.addLayer({
      id:'ps-circle-s-line', type:'line', source:'ps-circle-s',
      paint:{ 'line-color':'#ff3b30', 'line-width':2.2, 'line-opacity':0.9 }
    });

    mapReady = true;
    pendingMapTasks.forEach(fn => fn());
    pendingMapTasks.length = 0;
    updateTsunamiLayer();
  });
}
