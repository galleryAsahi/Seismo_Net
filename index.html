<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>地震情報</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg-app: #14161c;
  --bg-panel: #1b1e26;
  --bg-card: #262a34;
  --bg-card-hover: #2f333f;
  --border: #383c48;
  --text-main: #f2f3f5;
  --text-sub: #9aa0ad;
  --text-faint: #6b7280;
  --accent: #4d8dff;
  --danger: #ff3b30;
  --safe: #3fb950;

  --s1: rgb(242,242,255); --s1-fg:#1a1a2e;
  --s2: rgb(0,170,255);   --s2-fg:#ffffff;
  --s3: rgb(0,65,255);    --s3-fg:#ffffff;
  --s4: rgb(250,230,150); --s4-fg:#1a1a1a;
  --s5w: rgb(255,230,0);  --s5w-fg:#1a1a1a;
  --s5s: rgb(255,153,0);  --s5s-fg:#1a1a1a;
  --s6w: rgb(255,40,0);   --s6w-fg:#ffffff;
  --s6s: rgb(165,0,33);   --s6s-fg:#ffffff;
  --s7: rgb(180,0,104);   --s7-fg:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:var(--bg-app);
  color:var(--text-main);
  font-family:'M PLUS 1p','Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic UI','Yu Gothic','Meiryo',sans-serif;
  overflow:hidden;
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

button{font-family:inherit;}

#app{
  display:flex;
  width:100vw;
  height:100vh;
}

/* ===== レイアウト ===== */
#sidebar{
  width:340px;
  min-width:340px;
  height:100%;
  background:var(--bg-panel);
  display:flex;
  flex-direction:row;
  border-right:1px solid var(--border);
  z-index:2;
}
#sidebar-main{
  flex:1;
  min-width:0;
  height:100%;
  display:flex;
  flex-direction:column;
}
#conn-status{
  margin-top:auto;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}
#conn-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--text-faint);
  transition:background .3s;
}
#conn-dot.on{background:var(--safe);}
#conn-dot.off{background:var(--danger);}
#conn-dot.connecting{background:#e0a800;}

/* ===== タブ切り替え(縦アイコンレール) ===== */
#tab-rail{
  width:56px;
  min-width:56px;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:12px 8px;
  background:var(--bg-app);
  border-right:1px solid var(--border);
  flex-shrink:0;
}
.tab-btn{
  width:40px;
  height:40px;
  appearance:none;
  border:1px solid transparent;
  background:transparent;
  color:var(--text-sub);
  border-radius:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s, color .15s;
  position:relative;
}
.tab-btn:hover{
  background:var(--bg-card);
  color:var(--text-main);
}
.tab-btn.active{
  background:var(--accent);
  color:#fff;
}
.tab-icon{
  width:22px;
  height:22px;
}

/* ===== 設定タブ ===== */
#settings-panel{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  gap:18px;
}
#settings-panel[hidden]{ display:none; }
#settings-panel::-webkit-scrollbar{width:8px;}
#settings-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.settings-section{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.settings-section-title{
  font-size:11.5px;
  font-weight:700;
  color:var(--text-faint);
  letter-spacing:.04em;
  padding:0 6px 6px;
}
.settings-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 10px;
  border-radius:10px;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:6px;
  cursor:pointer;
}
.settings-row-label{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}
.settings-row-title{
  font-size:13.5px;
  font-weight:700;
  color:var(--text-main);
}
.settings-row-desc{
  font-size:11px;
  color:var(--text-sub);
  line-height:1.4;
}
.switch{
  position:relative;
  width:38px;
  height:22px;
  flex-shrink:0;
}
.switch input{
  position:absolute;
  opacity:0;
  width:100%;
  height:100%;
  margin:0;
  cursor:pointer;
  z-index:1;
}
.switch-track{
  position:absolute;
  inset:0;
  background:var(--bg-app);
  border:1px solid var(--border);
  border-radius:999px;
  transition:background .15s, border-color .15s;
}
.switch-track::after{
  content:'';
  position:absolute;
  top:2px;
  left:2px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:var(--text-faint);
  transition:transform .15s, background .15s;
}
.switch input:checked + .switch-track{
  background:var(--accent);
  border-color:var(--accent);
}
.switch input:checked + .switch-track::after{
  background:#fff;
  transform:translateX(16px);
}
.settings-info-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:12.5px;
  color:var(--text-sub);
  padding:8px 10px;
  border-bottom:1px solid var(--border);
}
.settings-info-row:last-child{ border-bottom:none; }

/* ===== EEWジェネレータ(テスト配信フォーム) ===== */
.eew-gen-note{
  font-size:11.5px;
  color:var(--text-sub);
  line-height:1.5;
  padding:0 6px 10px;
}
.eew-gen-form{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.eew-gen-row{
  display:flex;
  gap:8px;
}
.eew-gen-row > *{
  flex:1;
  min-width:0;
}
.eew-gen-field{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.eew-gen-label{
  font-size:11px;
  font-weight:700;
  color:var(--text-sub);
  padding:0 2px;
}
.eew-gen-input{
  width:100%;
  background:var(--bg-card);
  border:1px solid var(--border);
  color:var(--text-main);
  font-family:inherit;
  font-size:13px;
  border-radius:8px;
  padding:8px 10px;
  outline:none;
  transition:border-color .15s;
}
.eew-gen-input:focus{
  border-color:var(--accent);
}
select.eew-gen-input{
  appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%239aa0ad'><path d='M5.5 7.5l4.5 4.5 4.5-4.5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 8px center;
  background-size:16px;
  padding-right:28px;
}
select.eew-gen-input[multiple]{
  appearance:auto;
  background-image:none;
  padding-right:10px;
}
select.eew-gen-input[multiple] option{
  padding:4px 6px;
  border-radius:4px;
}
select.eew-gen-input[multiple] option:checked{
  background:var(--accent);
  color:#fff;
}
.eew-gen-check{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12.5px;
  color:var(--text-main);
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  cursor:pointer;
}
.eew-gen-check input{
  width:16px;
  height:16px;
  accent-color:var(--accent);
  cursor:pointer;
}
.eew-gen-check-wide{
  width:100%;
}
.eew-gen-field.is-disabled{
  opacity:0.45;
  pointer-events:none;
}
.eew-gen-actions{
  display:flex;
  gap:8px;
  margin-top:4px;
}
.eew-gen-btn{
  flex:1;
  appearance:none;
  border:1px solid var(--border);
  background:var(--bg-card);
  color:var(--text-main);
  font-family:inherit;
  font-size:13px;
  font-weight:700;
  border-radius:8px;
  padding:10px 12px;
  cursor:pointer;
  transition:background .15s, border-color .15s;
}
.eew-gen-btn:hover{
  background:var(--bg-card-hover);
}
.eew-gen-btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.gen-type-switch{
  display:flex;
  gap:4px;
  padding:3px;
  background:var(--bg-app);
  border:1px solid var(--border);
  border-radius:10px;
  margin:0 6px 12px;
}
.gen-type-btn{
  flex:1;
  appearance:none;
  border:none;
  background:transparent;
  color:var(--text-sub);
  font-size:12.5px;
  font-weight:700;
  padding:8px 6px;
  border-radius:7px;
  cursor:pointer;
  transition:background .15s, color .15s;
}
.gen-type-btn:hover{
  color:var(--text-main);
}
.gen-type-btn.active{
  background:var(--accent);
  color:#fff;
}
.gen-panel[hidden]{ display:none; }
.eew-gen-btn.primary:hover{
  filter:brightness(1.08);
}
.settings-info-value{ color:var(--text-main); font-weight:500; }

#event-list{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
#event-list[hidden]{ display:none; }
#event-list::-webkit-scrollbar{width:8px;}
#event-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.list-footer{
  flex-shrink:0;
  text-align:center;
  font-size:11.5px;
  color:var(--text-faint);
  padding:10px 0 4px;
}

#map-container{
  flex:1;
  height:100%;
  position:relative;
}
#map{
  width:100%;
  height:100%;
}
.maplibregl-ctrl-attrib{display:none !important;}
.maplibregl-ctrl-logo{display:none !important;}

/* ===== 震度カード共通 ===== */
.eq-card{
  background:var(--bg-card);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  border:1px solid var(--border);
  transition:background .15s, border-color .15s, transform .1s;
  flex-shrink:0;
}
.eq-card:hover{
  background:var(--bg-card-hover);
  border-color:#4a4f5e;
}
.eq-card:active{transform:scale(0.995);}
.eq-card.selected{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent);
}

.eq-card-main{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 10px;
}

.scale-badge{
  width:48px;
  height:48px;
  min-width:48px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:900;
  line-height:1;
}
.scale-badge.small-num{font-size:20px;}

.eq-card-info{
  flex:1;
  min-width:0;
}
.eq-card-time{
  font-size:10.5px;
  color:var(--text-sub);
  margin-bottom:1px;
}
.eq-card-place{
  font-size:14px;
  font-weight:700;
  color:var(--text-main);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.eq-card-meta{
  display:flex;
  gap:8px;
  margin-top:4px;
}
.meta-chip{
  display:flex;
  align-items:center;
  gap:3px;
  font-size:11px;
  color:var(--text-sub);
  padding-left:6px;
  border-left:3px solid;
}
.meta-chip.mag{border-color:#ff9d33;} /* JS側でmagColor()により動的に上書き */
.meta-chip.depth{border-color:#f5e642;} /* JS側でdepthColor()により動的に上書き */

.tsunami-banner{
  font-size:12px;
  font-weight:700;
  text-align:center;
  padding:7px 8px;
  margin:0 8px 8px;
  border-radius:999px;
}
.tsunami-banner.warning{
  background:#e02020;
  color:#fff;
}
.tsunami-banner.none{
  background:#f2f2f2;
  color:#222;
}
.tsunami-banner.watch{
  background:#ffcf33;
  color:#222;
}

/* ===== EEW(緊急地震速報)カード ===== */
/* NHK/気象庁の緊急地震速報チャイム画面を忠実に再現したデザイン。
   カード全体は濃いグレー単色地。ヘッダー帯・震度/長周期地震動階級の帯は
   震度配色(.s1〜.s7)をそのまま帯の背景色として使う。 */
.eew-card{
  --eew-outline-color: #525252;
  background:#8a8a8a;
  border-radius:12px;
  overflow:hidden;
  border:none;
  flex-shrink:0;
  color:#fff;
  padding:10px;
  text-shadow:
    -1.4px -1.4px 0 var(--eew-outline-color),
     1.4px -1.4px 0 var(--eew-outline-color),
    -1.4px  1.4px 0 var(--eew-outline-color),
     1.4px  1.4px 0 var(--eew-outline-color),
     0   -1.4px 0 var(--eew-outline-color),
     0    1.4px 0 var(--eew-outline-color),
    -1.4px  0   0 var(--eew-outline-color),
     1.4px  0   0 var(--eew-outline-color),
    -1.4px -1.4px 0 var(--eew-outline-color),
     1.4px -1.4px 0 var(--eew-outline-color),
    -1.4px  1.4px 0 var(--eew-outline-color),
     1.4px  1.4px 0 var(--eew-outline-color),
    -1.4px -1.4px 0 var(--eew-outline-color),
     1.4px -1.4px 0 var(--eew-outline-color),
    -1.4px  1.4px 0 var(--eew-outline-color),
     1.4px  1.4px 0 var(--eew-outline-color);
}
/* 震度・長周期地震動バッジ(色つき背景の帯)は気象庁配色の文字色(--sX-fg)をそのまま使うため、
   縁取りを付けると逆に視認性が落ちる(白地に黒文字の場合など)。帯の中だけ縁取りを打ち消す。 */
.eew-intensity-row, .eew-lpgm-row, .eew-kind-tag{
  text-shadow:none;
}
.eew-card.selected{
  box-shadow:0 0 0 2px var(--accent);
}
.eew-card{
  position:relative;
}
.eew-cancel-overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.72);
  border-radius:12px;
  color:#fff;
  font-size:19px;
  font-weight:900;
  line-height:1.4;
  text-align:center;
  padding:10px 8px;
  z-index:2;
  text-shadow:
    -1.4px -1.4px 0 #000,
     1.4px -1.4px 0 #000,
    -1.4px  1.4px 0 #000,
     1.4px  1.4px 0 #000,
     0   -1.4px 0 #000,
     0    1.4px 0 #000,
    -1.4px  0   0 #000,
     1.4px  0   0 #000;
}
.eew-card-head{
  display:flex;
  align-items:stretch;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}
.eew-card-head-title{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:900;
  color:#fff;
  letter-spacing:.02em;
  background:#5c5f66;
  border-radius:6px;
  padding:6px 10px;
}
.eew-kind-tag{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:900;
  padding:6px 16px;
  border-radius:6px;
  line-height:1.3;
}
.eew-kind-tag.is-warn{
  background:#e60012;
  color:#ffe400;
}
.eew-kind-tag.is-forecast{
  background:#ffe400;
  color:#1a1a1a;
}
.eew-card-sub{
  font-size:13px;
  font-weight:500;
  color:#fff;
  padding:0 2px;
}
.eew-card-place{
  font-size:19px;
  font-weight:900;
  color:#fff;
  padding:2px 2px 0;
}
.eew-card-place-suffix{
  font-size:14px;
  font-weight:500;
  color:#fff;
}
.eew-card-body{
  padding:8px 0 0;
  display:flex;
  flex-direction:column;
  gap:7px;
}
.eew-intensity-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:8px 12px;
  border-radius:6px;
  background:#6b6e78;
  color:#fff;
}
.eew-intensity-label{
  font-size:15px;
  font-weight:700;
  color:inherit;
}
.eew-intensity-badge{
  font-size:26px;
  font-weight:900;
  line-height:1;
  color:inherit;
}
.eew-lpgm-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:6px 12px;
  border-radius:6px;
  background:#6b6e78;
  color:#fff;
}
.eew-lpgm-label{
  font-size:13px;
  font-weight:700;
  color:inherit;
  white-space:nowrap;
}
.eew-lpgm-badge{
  font-size:18px;
  font-weight:900;
  line-height:1;
  color:inherit;
  flex-shrink:0;
}
.eew-stats-row{
  display:flex;
  align-items:center;
  gap:20px;
  margin-top:2px;
  padding:0 2px;
}
.eew-stat{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:21px;
  font-weight:900;
  color:#fff;
  padding-left:10px;
  border-left:5px solid;
}
.eew-note-line{
  line-height:1.5;
  padding:2px 2px 0;
}
.eew-note-line.eew-note-a{
  font-size:14px;
  font-weight:700;
  color:#fff;
}
.eew-note-line.eew-note-b{
  font-size:12px;
  font-weight:500;
  color:#fff;
  opacity:.85;
}
.eew-note-line.eew-note-c{
  font-size:12px;
  font-weight:700;
  color:#fff;
  opacity:.9;
}
.eew-final-badge{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  color:#fff;
  border:1px solid rgba(255,255,255,.5);
  border-radius:999px;
  padding:1px 7px;
  margin-left:6px;
}
.eew-cancel-banner{
  font-size:12px;
  font-weight:700;
  text-align:center;
  padding:7px 8px;
  margin:0 8px 8px;
  border-radius:999px;
  background:#f2f2f2;
  color:#222;
  text-shadow:none;
}

/* 震度色 */
.s1{ background:var(--s1); color:var(--s1-fg); }
.s2{ background:var(--s2); color:var(--s2-fg); }
.s3{ background:var(--s3); color:var(--s3-fg); }
.s4{ background:var(--s4); color:var(--s4-fg); }
.s5w{ background:var(--s5w); color:var(--s5w-fg); }
.s5s{ background:var(--s5s); color:var(--s5s-fg); }
.s6w{ background:var(--s6w); color:var(--s6w-fg); }
.s6s{ background:var(--s6s); color:var(--s6s-fg); }
.s7{ background:var(--s7); color:var(--s7-fg); }

/* イベント種別アイコン(地震/EEW/津波) */
.evt-icon{
  width:16px;height:16px;
  display:inline-block;
  vertical-align:-3px;
}

/* ===== 津波情報サマリーパネル ===== */
/* 個々の発表(552)をカード化せず、現在発表中の状況を種別ごとに1枚にまとめて表示する */
#tsunami-summary{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.tsunami-updated{
  font-size:11px;
  color:var(--text-sub);
  padding:0 2px;
}
.tsunami-grade-group{
  background:var(--bg-card);
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
}
.tsunami-grade-head{
  display:flex;
