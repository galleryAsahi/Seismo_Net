let reconnectAttempts = 0;
let reconnectTimer = null;
let lastEventTime = 0; // 直近に受信したイベントのUnix time(ms) 目安

async function fetchHistory(){
  try{
    const res = await fetch(HISTORY_URL);
    if(!res.ok) throw new Error('history fetch failed: ' + res.status);
    const list = await res.json();
    // 履歴APIは新しい順で返る想定 -> 古い順に並べ替えてから追加(addEventは先頭追加のため)
    const ordered = [...list].sort((a,b) => new Date(a.time) - new Date(b.time));
    for(const raw of ordered){
      addEvent(raw, 'history');
      const t = Date.parse(raw.time);
      if(!isNaN(t) && t > lastEventTime) lastEventTime = t;
    }
    // 無限スクロールでの追加読み込み(loadMoreHistory)は/v2/jma/quakeのみを使うため、
    // ここで取得できた地震(551)の中で最も古い発生日を起点(until_date)として引き継ぐ。
    // これを設定しないと、loadMoreHistoryの初回取得が「最新から」となり、ここで既に
    // 読み込んだ範囲と丸ごと重複して全件seenIds除外(=added 0)になってしまう。
    const quakeOnly = (Array.isArray(list) ? list : []).filter(r => r.code === 551);
    if(quakeOnly.length > 0){
      const oldestRaw = quakeOnly.reduce((a,b) => new Date(a.time) < new Date(b.time) ? a : b);
      const oldestTime = (oldestRaw.earthquake && oldestRaw.earthquake.time) || null;
      const oldestDate = jstTimeToYyyyMmDd(oldestTime);
      if(oldestDate) state.lastHistoryOldestDate = oldestDate;
    }
  }catch(err){
    console.error('履歴取得に失敗しました', err);
  }
}

// 無限スクロール: リスト最下部まで到達するたびに呼ばれ、過去ログを1ページ(最大100件)追加する。
// /v2/jma/quake (地震のみ、551)を until_date(指定日以前) で1ページごとに前日へ進めながら読み進める。
// (/v2/historyのoffsetページングは、同一offsetでも件数の増減で内容がずれるため無限スクロールの
// 追加読み込みには使わず、日付ベースで確実に前進できるjma/quakeに一本化している。
// 津波(552)は/v2/historyの初期取得(fetchHistory)・再接続補完(fillGapFromHistory)でのみ扱う)
// 1回の呼び出しで実際に新規追加できた件数が0件だった場合(=そのページが全部既読み込み分と
// 重複していた、等)は、リストが実質伸びていないため続けて次ページを自動的に試す。
async function loadMoreHistory(){
  if(state.loadingMore) return;
  if(state.jmaExhausted) return;
  state.loadingMore = true;
  const footerEl = document.getElementById('list-footer');
  if(footerEl) footerEl.textContent = '読み込み中…';
  try{
    let addedTotal = 0;
    let guard = 0; // 空振りページが延々続く異常系への保険(通常は数ページ以内で決着する)
    // 追加件数0の空振りが続いてもリストが伸びるまで(またはjmaが尽きるまで)ページを進める
    while(addedTotal === 0 && !state.jmaExhausted && guard < 50){
      guard++;
      // until_dateは「指定日"以前"」を含む境界。同じuntil_date(同日)のまま据え置いて
      // 再取得する方式だと、その日の地震がlimit(100件)を超えている場合、2回目以降の
      // リクエストも1回目と同じ最新100件を返すだけになり、全件がseenIdsで重複除外されて
      // added=0になる。すると「その日はもう読み切った」と誤判定して即座に前日へ進んでしまい、
      // 実際にはまだ取得できていない同日の残りイベント(震源情報や地震情報を含む)が
      // 一切取得されないまま欠落する不具合があった。
      // そのため、ページごとに必ず「そのページで取得できた中の最古日の前日」を次のuntil_date
      // にする(同日据え置きはしない)。境界日をまたいで重複するイベントはseenIdsが除外する。
      // 初回(jmaUntilDate未設定)は、fetchHistoryで既に読み込んだ最古日(lastHistoryOldestDate)を
      // 起点にする。これが無いと「最新から」取得することになり、fetchHistoryで読んだ範囲と
      // 丸ごと重複してしまう。
      if(!state.jmaUntilDate && state.lastHistoryOldestDate){
        state.jmaUntilDate = state.lastHistoryOldestDate;
      }
      const untilParam = state.jmaUntilDate ? `&until_date=${state.jmaUntilDate}` : '';
      const res = await fetch(`${JMA_QUAKE_URL}&order=-1${untilParam}`);
      if(!res.ok) throw new Error('jma/quake fetch failed: ' + res.status);
      const list = await res.json();
      if(!Array.isArray(list) || list.length === 0){
        state.jmaExhausted = true;
        continue; // このページは空 -> ループ条件で終了
      }

      // 取得順(新しい順)のまま末尾に積んでいけば、リスト全体として新しい順が保たれる
      let added = 0;
      for(const raw of list){
        added += appendOlderEvent(raw);
      }
      addedTotal += added;

      // 取得できたページの最古日の前日を次回のuntil_dateにし、常に1日ずつ過去へ進める。
      // (同日を再取得しないので、その日の件数がlimitを超えていて取りこぼしがあっても
      // 無限ループにはならず、かつ同日据え置きより取得漏れのリスクが小さい)
      const oldestRaw = list[list.length - 1];
      const oldestTime = (oldestRaw && oldestRaw.earthquake && oldestRaw.earthquake.time) || null;
      const oldestDate = jstTimeToYyyyMmDd(oldestTime);
      if(oldestDate){
        const nextUntil = yyyyMmDdMinusOneDay(oldestDate);
        // 前回と同じ(またはそれ以降の)until_dateにしかならない場合は、これ以上
        // 過去へ進めないとみなして打ち切る(無限ループ防止の保険)。
        if(state.jmaUntilDate && nextUntil >= state.jmaUntilDate){
          state.jmaExhausted = true;
        } else {
          state.jmaUntilDate = nextUntil;
        }
      } else {
        state.jmaExhausted = true; // 日付が取れない場合は安全側に倒して打ち切る
      }
    }
    if(state.activeTab === 'earthquake') renderList();
  }catch(err){
    console.error('過去ログの追加読み込みに失敗しました', err);
    if(state.activeTab === 'earthquake') renderList();
  }finally{
    state.loadingMore = false;
  }
}

// リスト最下部(#event-list)へのスクロールを検知して追加読み込みをトリガーする。
// 地震情報タブでのみ有効(EEW/津波タブはページング対象外)。
listEl.addEventListener('scroll', () => {
  if(state.activeTab !== 'earthquake') return;
  const remaining = listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight;
  if(remaining < 150) loadMoreHistory();
});

// 再接続時、取りこぼした分を履歴APIから補完
async function fillGapFromHistory(){
  try{
    const res = await fetch(HISTORY_URL);
    if(!res.ok) return;
    const list = await res.json();
    const ordered = [...list].sort((a,b) => new Date(a.time) - new Date(b.time));
    let addedAny = false;
    for(const raw of ordered){
      if(!state.seenIds.has(eqId(raw))){
        addEvent(raw, 'history');
        addedAny = true;
      }
    }
    // 履歴補完(source:'history')はaddEvent内では選択を奪わない仕様のため、
    // 再接続中にWSを介さず新しい地震が紛れ込むと、古い地震が選択されたまま
    // リスト先頭には新しい地震が並ぶ「選択とリスト先頭がズレる」状態になりうる。
    // 補完で1件でも追加があった場合は、地震情報タブの選択を最新の地震に合わせ直す。
    if(addedAny){
      const latestEarthquake = sortedEarthquakeEvents()[0];
      if(latestEarthquake && state.selectedId !== latestEarthquake.id){
        selectEvent(latestEarthquake.id);
        if(state.activeTab === 'earthquake') renderScaleOnMap(latestEarthquake.raw);
      }
    }
  }catch(err){
    console.error('補完取得に失敗しました', err);
  }
}

function connectWebSocket(){
  setConnStatus('connecting');
  try{
    ws = new WebSocket(WS_URL);
  }catch(err){
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    reconnectAttempts = 0;
    setConnStatus('on');
    // 再接続時は取りこぼし補完
    fillGapFromHistory();
  };

  ws.onmessage = (msg) => {
    try{
      const raw = JSON.parse(msg.data);
      if(raw.code === 551 || raw.code === 552){
        addEvent(raw, 'ws');
      }
    }catch(err){
      console.error('メッセージの解析に失敗しました', err);
    }
  };

  ws.onclose = () => {
    setConnStatus('off');
    scheduleReconnect();
  };

  ws.onerror = () => {
    ws.close();
  };
}

function scheduleReconnect(){
  if(reconnectTimer) return;
  const delay = Math.min(30000, 1000 * Math.pow(2, reconnectAttempts));
  reconnectAttempts++;
  setConnStatus('connecting');
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connectWebSocket();
  }, delay);
}

/* ============================================================
   EEW(緊急地震速報) データ取得・WebSocket接続
   ============================================================ */
// p2pquake(地震・津波)とは別系統のAPIのため、接続・再接続は完全に独立させる。
// UI上の接続ドット(#conn-dot)はp2pquake側の状態のみを表す(EEWの接続断は静かに
// バックグラウンドで再接続を試み、致命的な問題ではないためUIには反映しない)。

let eewWs = null;
let eewReconnectAttempts = 0;
let eewReconnectTimer = null;

// 起動時、現在発表中のEEWがあれば取得して表示する。
// WolfXの仕様上、EEWが発表されていない時のレスポンス形式が不明瞭なため、
// EventIDを含む妥当なオブジェクトが返ってきた場合のみ取り込む(空応答やエラーは無視)。
async function fetchInitialEEW(){
  try{
    const res = await fetch(EEW_INITIAL_URL);
    if(!res.ok) return;
    const raw = await res.json();
    if(raw && raw.EventID) upsertEEW(raw);
  }catch(err){
    console.error('EEW初期取得に失敗しました', err);
  }
}

function connectEEWWebSocket(){
  try{
    eewWs = new WebSocket(EEW_WS_URL);
  }catch(err){
    scheduleEEWReconnect();
    return;
  }

  eewWs.onopen = () => {
    eewReconnectAttempts = 0;
  };

  eewWs.onmessage = (msg) => {
    try{
      const raw = JSON.parse(msg.data);
      // WolfXのall_eewは地域(JMA以外)のEEWも混在して配信されるため、
      // JMA由来のデータ(EventIDを持つもの)のみを対象にする。
      if(raw && raw.EventID) upsertEEW(raw);
    }catch(err){
      console.error('EEWメッセージの解析に失敗しました', err);
    }
  };

  eewWs.onclose = () => {
    scheduleEEWReconnect();
  };

  eewWs.onerror = () => {
    eewWs.close();
  };
}

function scheduleEEWReconnect(){
  if(eewReconnectTimer) return;
  const delay = Math.min(30000, 1000 * Math.pow(2, eewReconnectAttempts));
  eewReconnectAttempts++;
  eewReconnectTimer = setTimeout(() => {
    eewReconnectTimer = null;
    connectEEWWebSocket();
  }, delay);
}

function waitForMapReady(){
  return new Promise(resolve => onMapReady(resolve));
}

async function init(){
  // EEWは緊急性が高く、地図準備や地震履歴取得の完了を待つと表示が遅れてしまうため、
  // 他の初期化より先に・最優先で開始する(すべて非同期でここでは待たない)。
  fetchInitialEEW();
  connectEEWWebSocket();

  initMap();
  await waitForMapReady(); // 地図(geojson)の初期表示が終わるまでイベント一覧の取得・表示を待つ
  await fetchHistory();
  selectLatestEarthquakeByDefault();
  connectWebSocket();
}

// 起動時、一覧の中から最新(=先頭)の地震情報を自動選択し、地図にデフォルト表示する。
// 履歴には地震(551)・津波(552)が混在するため、type==='earthquake' のものだけを対象にする。
function selectLatestEarthquakeByDefault(){
  if(state.selectedId != null) return; // 既に何か選択済みなら上書きしない
  const latest = sortedEarthquakeEvents()[0];
  if(latest) selectEvent(latest.id);
}

/* ============================================================
   設定パネルのUI連携
   ============================================================ */
// チェックボックスの初期状態を保存済み設定に合わせ、変更のたびに保存する。
// ブラウザ通知はOSレベルの許可が必要なため、ONにした瞬間に許可をリクエストし、
// 拒否された場合はトグルを自動的にOFFへ戻す。
function initSettingsPanel(){
  const soundEl = document.getElementById('setting-eew-sound');
  const notifyEl = document.getElementById('setting-browser-notify');
  const flyToEl = document.getElementById('setting-auto-flyto');
  const switchTabEl = document.getElementById('setting-auto-switch-tab');

  soundEl.checked = settings.eewSound;
  notifyEl.checked = settings.browserNotify;
  flyToEl.checked = settings.autoFlyTo;
  switchTabEl.checked = settings.autoSwitchTab;

  soundEl.addEventListener('change', () => {
    settings.eewSound = soundEl.checked;
    saveSettings(settings);
    if(settings.eewSound) playEEWChime(); // ON時に音を試し鳴らしする
  });

  notifyEl.addEventListener('change', () => {
    if(notifyEl.checked){
      if(typeof Notification === 'undefined'){
        notifyEl.checked = false;
        return;
      }
      if(Notification.permission === 'granted'){
        settings.browserNotify = true;
        saveSettings(settings);
      } else if(Notification.permission === 'denied'){
        notifyEl.checked = false; // ブラウザ側で拒否済みの場合はONにできない
      } else {
        Notification.requestPermission().then(perm => {
          settings.browserNotify = (perm === 'granted');
          notifyEl.checked = settings.browserNotify;
          saveSettings(settings);
        });
      }
    } else {
      settings.browserNotify = false;
      saveSettings(settings);
    }
  });

  flyToEl.addEventListener('change', () => {
    settings.autoFlyTo = flyToEl.checked;
    saveSettings(settings);
  });

  switchTabEl.addEventListener('change', () => {
    settings.autoSwitchTab = switchTabEl.checked;
    saveSettings(settings);
  });
}
initSettingsPanel();

// 実際の受信データと全く同じ経路(upsertEEW)に渡す。これによりEEWタブへのカード表示・
// 地図への震源表示・受信音/ブラウザ通知・5分自動失効まで、本番の受信EEWと同一に振る舞う。
//
// EventIDを指定しなかった場合は現在時刻から自動生成する(WolfXの実データはJST日時ベースの
// 文字列IDを使うため、それに似た形式にしておく)。同じEventIDを指定して連続で配信すれば、
// 続報(Serialを増やしたもの)としてマージされる挙動もテストできる。
function genEventIdFromNow(){
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}

// OriginTime/AnnouncedTimeはWolfXの実データに合わせ "yyyy/MM/dd HH:mm:ss" のJST文字列にする。
// 「今まさに発生した地震」を模擬するテスト用途のため、常に現在時刻を発生時刻として使う。
function nowAsJstTimeString(){
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

// --- 震度自動計算(距離減衰式) ---
// 震源(緯度経度・M)から、各細分区域の代表座標までの震央距離(km)を求め、
// 気象庁が広く紹介している簡易的な距離減衰式(震源の深さは0km=直下と仮定)で
// その区域の推定震度(気象庁震度階、連続値)を計算する。
//   震度 I = M - log10(Δ + 0.001*10^(0.5*M)) - 0.0035*Δ + 0.5
//   (Δ: 震央距離km。深さ0km仮定のため震央距離=震源距離として扱う簡易版)
// この式はNIED等でも紹介される概算式で、あくまで「表示用の目安」であることに留意。
// 算出したIを既存のscaleInfo()と同じ10刻みscale値(10,20,...,70)にスナップして返す。
function haversineDistanceKm(lat1, lng1, lat2, lng2){
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return EARTH_RADIUS_KM * c;
}

function estimateIntensityScale(mag, distanceKm){
  if(mag == null || isNaN(mag) || distanceKm == null || isNaN(distanceKm)) return null;
  const delta = Math.max(distanceKm, 0.1); // 0除算・log(0)回避
  const I = mag - Math.log10(delta + 0.001 * Math.pow(10, 0.5 * mag)) - 0.0035 * delta + 0.5;
  // 連続値の震度Iを10刻みのscale値(気象庁配色・階級表示に使う既存の単位系)に変換する。
  // 0.5刻みでおおよそ震度階級に対応させ、5弱/5強・6弱/6強の境界も概ね再現する。
  if(I < 0.5) return null; // 震度0未満は「揺れなし」とみなし対象外
  if(I < 1.5) return 10;
  if(I < 2.5) return 20;
  if(I < 3.5) return 30;
  if(I < 4.5) return 40;
  if(I < 5.0) return 45;
  if(I < 5.5) return 50;
  if(I < 6.0) return 55;
  if(I < 6.5) return 60;
  return 70;
}

// scale値(10刻み) -> WolfX形式の震度ラベル("1","5弱","5強"等)に変換
function scaleToJmaIntensityLabel(scale){
  const map = {10:'1', 20:'2', 30:'3', 40:'4', 45:'5弱', 50:'5強', 55:'6弱', 60:'6強', 70:'7'};
  return map[scale] || null;
}

// 震源(lat, lng, mag)から全細分区域までの距離減衰で震度を計算し、WolfXのWarnArea形式
// ({Chiiki, Shindo}の配列)を組み立てる。震度階級1未満(震度0相当)の区域は含めない。
// 深さは常に0km仮定(距離減衰式が震源直下からの震央距離を前提とした簡易式のため)。
function buildWarnAreaByAttenuation(lat, lng, mag){
  if(isNaN(lat) || isNaN(lng) || isNaN(mag)) return [];
  const results = [];
  for(const code in AREA_CENTER_BY_CODE){
    const center = AREA_CENTER_BY_CODE[code];
    const distanceKm = haversineDistanceKm(lat, lng, center.lat, center.lng);
    const scale = estimateIntensityScale(mag, distanceKm);
    if(scale == null) continue;
    const label = scaleToJmaIntensityLabel(scale);
    if(!label) continue;
    const name = AREA_NAME_BY_CODE[code];
    if(!name) continue;
    results.push({ Chiiki: name, Shindo: label, _scale: scale });
  }
  // 震度が大きい順に並べ、テキスト表示(警報区域一覧)でも上位が目立つようにする
  results.sort((a, b) => b._scale - a._scale);
  return results.map(({ Chiiki, Shindo }) => ({ Chiiki, Shindo }));
}

function fillEEWGeneratorRandom(){
  const preset = randomChoice(EEW_GEN_PRESETS);
  // 表示座標にわずかなブレを与え、震源が毎回まったく同じ点にならないようにする
  const lat = randomInRange(preset.lat - 0.3, preset.lat + 0.3, 2);
  const lng = randomInRange(preset.lng - 0.3, preset.lng + 0.3, 2);
  const mag = randomInRange(3.5, 7.5, 1);
  const depth = Math.round(randomInRange(0, 80, 0));
  const intensity = randomChoice(EEW_GEN_INTENSITIES);

  document.getElementById('eewgen-eventid').value = '';
  document.getElementById('eewgen-serial').value = 1;
  document.getElementById('eewgen-hypocenter').value = preset.name;
  document.getElementById('eewgen-lat').value = lat;
  document.getElementById('eewgen-lng').value = lng;
  document.getElementById('eewgen-mag').value = mag;
  document.getElementById('eewgen-depth').value = depth;
  document.getElementById('eewgen-maxintensity').value = intensity;
  // 震度5弱以上の場合のみ警報(isWarn)を自然な形でONにする
  const scale = jmaIntensityToScale(intensity);
  // 長周期地震動階級も、震度5弱以上(高層階で揺れが問題になりうる規模)の場合のみ
  // それっぽくランダムな階級(1〜3)を入れる。震度が低い場合は「指定しない」のままにする。
  document.getElementById('eewgen-lpgm').value = (scale != null && scale >= 45)
    ? String(Math.round(randomInRange(1, 3, 0)))
    : '';
  document.getElementById('eewgen-warnarea').value = '';
  document.getElementById('eewgen-iswarn').checked = (scale != null && scale >= 45);
  document.getElementById('eewgen-isfinal').checked = false;
  document.getElementById('eewgen-isassumption').checked = false;
  document.getElementById('eewgen-iscancel').checked = false;
  // 海域震源(isSea)はプリセットの地名から妥当な初期値を自動セットする(手動で変更可能)
  document.getElementById('eewgen-issea').checked = guessIsSeaHypocenter(preset.name);
}

// フォームの現在値からWolfX形式のraw EEWオブジェクトを組み立てる。
function buildEEWFromForm(){
  const eventIdInput = document.getElementById('eewgen-eventid').value.trim();
  const eventId = eventIdInput || genEventIdFromNow();
  const serial = document.getElementById('eewgen-serial').value.trim() || '1';
  const hypocenter = document.getElementById('eewgen-hypocenter').value.trim() || '不明';
  const lat = parseFloat(document.getElementById('eewgen-lat').value);
  const lng = parseFloat(document.getElementById('eewgen-lng').value);
  const mag = parseFloat(document.getElementById('eewgen-mag').value);
  const depth = parseFloat(document.getElementById('eewgen-depth').value);
  const maxIntensity = document.getElementById('eewgen-maxintensity').value;
  const lpgmRaw = document.getElementById('eewgen-lpgm').value;
  const lpgmClass = lpgmRaw ? parseInt(lpgmRaw, 10) : null;
  const autoShindo = document.getElementById('eewgen-autoshindo').checked;
  const warnAreaRaw = document.getElementById('eewgen-warnarea').value.trim();
  const isWarn = document.getElementById('eewgen-iswarn').checked;
  const isFinal = document.getElementById('eewgen-isfinal').checked;
  const isAssumption = document.getElementById('eewgen-isassumption').checked;
  const isCancel = document.getElementById('eewgen-iscancel').checked;
  const isSea = document.getElementById('eewgen-issea').checked;

  // 「区域ごとの震度を自動計算する」がONの場合、震源(緯度経度・M、深さ0km仮定)から
  // 全細分区域までの距離減衰式で震度を計算しWarnAreaを埋める(手入力欄は無視する)。
  // OFFの場合は従来通り手入力(カンマ区切りの地名、震度指定なし)を使う。
  const warnArea = autoShindo
    ? buildWarnAreaByAttenuation(lat, lng, mag)
    : (warnAreaRaw
        ? warnAreaRaw.split(',').map(s => s.trim()).filter(Boolean).map(name => ({ Chiiki: name }))
        : []);

  const originTime = nowAsJstTimeString();

  return {
    Title: '緊急地震速報(テスト配信)',
    CodeType: 'EEW',
    Serial: serial,
    EventID: eventId,
    AnnouncedTime: originTime,
    OriginTime: originTime,
    Hypocenter: hypocenter,
    Latitude: isNaN(lat) ? null : lat,
    Longitude: isNaN(lng) ? null : lng,
    Magunitude: isNaN(mag) ? null : mag,
    Depth: isNaN(depth) ? null : depth,
    MaxIntensity: maxIntensity,
    LgIntensity: lpgmClass,
    isWarn,
    isFinal,
    isCancel,
    isAssumption,
    isTraining: false,
    isSea,
    WarnArea: warnArea
  };
}

function initEEWGenerator(){
  const form = document.getElementById('eew-gen-form');
  const randomBtn = document.getElementById('eewgen-random');
  if(!form) return;

  // 「区域ごとの震度を自動計算する」トグルに応じて、手入力の警報区域欄を
  // 有効/無効(見た目でも分かるよう淡色化)にする。
  const autoShindoEl = document.getElementById('eewgen-autoshindo');
  const warnAreaFieldEl = document.getElementById('eewgen-warnarea-field');
  function syncWarnAreaFieldState(){
    if(warnAreaFieldEl) warnAreaFieldEl.classList.toggle('is-disabled', autoShindoEl.checked);
  }
  if(autoShindoEl){
    autoShindoEl.addEventListener('change', syncWarnAreaFieldState);
    syncWarnAreaFieldState();
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const raw = buildEEWFromForm();
    upsertEEW(raw);
    // 配信後、続報テストをしやすいようEventIDとSerialを引き継いだまま次のSerialへ進める。
    // (取消報を送った場合は、そのEventIDでのやり取りが終わったとみなしEventIDをクリアする)
    if(raw.isCancel){
      document.getElementById('eewgen-eventid').value = '';
      document.getElementById('eewgen-serial').value = 1;
    } else {
      document.getElementById('eewgen-eventid').value = raw.EventID;
      const nextSerial = (parseInt(raw.Serial, 10) || 1) + 1;
      document.getElementById('eewgen-serial').value = nextSerial;
    }
    // 配信したら自動的にEEWタブへ切り替えて結果を確認しやすくする
    setActiveTab('eew');
  });

  randomBtn.addEventListener('click', fillEEWGeneratorRandom);
}
initEEWGenerator();

/* ============================================================
   津波情報ジェネレータ(設定タブ: テスト用に津波情報を選択式で組み立てて配信する)
   ============================================================ */
// EEWジェネレータと同様、フォームの入力値からp2pquake(code:552)のレスポンスと
// 同じ形のオブジェクト(raw)を組み立て、実際の受信データと全く同じ経路(addEvent)に
// 渡す。これにより津波タブへのサマリー表示・地図への区域塗り分けまで、本番の
// 受信データと同一に振る舞う。
// 区域は自由入力ではなくプリセットからの選択式とし、実際の津波予報区名と
// 一致しない入力によって地図が塗られない、という事故を防ぐ。
function genTsunamiIdFromNow(){
  return 'tsunamigen-' + Date.now() + '-' + Math.floor(Math.random() * 100000);
}

// grade(発表種別)ごとに、選んだ高さ(m)からp2pquake形式のmaxHeight.description相当の
// 文字列を組み立てる。実データはgradeとdescriptionの整合性が取れているため、
// ジェネレータでもそれに寄せる(例: 大津波警報で「10m超」等)。
function tsunamiHeightDescription(heightValue){
  if(heightValue >= 10) return '10m超';
  if(heightValue >= 5) return '5m';
  if(heightValue >= 3) return '3m';
  if(heightValue >= 1) return '1m';
  return '0.2m';
}

// tsunami_forecast.geojsonの全区域(実データの津波予報区。プリセットの12件に限らない)の
// 概算中心座標。ジェネレータのM値ベース距離減衰計算・手動選択セレクトの両方で使う。
// 地図読み込み時にbuildTsunamiAreaCentersFromFeatures()で実データから構築される。
let TSUNAMI_AREA_CENTERS = {};

// GeoJSONジオメトリ(Point/LineString/MultiLineString/Polygon/MultiPolygon等)の
// 全座標を再帰的に集計し、単純平均による概算中心点[lng, lat]を返す。
// (extendBoundsWithGeometryと同じ深さテーブルを使う軽量な重心近似)
function computeGeometryCentroid(geometry){
  if(!geometry) return null;
  let lngSum = 0, latSum = 0, count = 0;
  const walk = (coords, depth) => {
    if(depth === 0){
      lngSum += coords[0];
      latSum += coords[1];
      count++;
      return;
    }
    for(const c of coords) walk(c, depth - 1);
  };
  const depthByType = {
    Point: 0, MultiPoint: 1, LineString: 1,
    MultiLineString: 2, Polygon: 2, MultiPolygon: 3
  };
  const depth = depthByType[geometry.type];
  if(depth == null) return null;
  walk(geometry.coordinates, depth);
  if(count === 0) return null;
  return { lng: lngSum / count, lat: latSum / count };
}

// tsunami_forecast.geojsonの読み込み完了時に呼ばれ、実データの全区域(properties.name)
// について概算中心座標のテーブルを構築する。ハードコードされたプリセットに限らず、
// 実際に地図へ塗り分けられる全区域が距離減衰計算・手動選択の対象になる。
function buildTsunamiAreaCentersFromFeatures(features){
  const centers = {};
  for(const f of (features || [])){
    const name = f.properties && f.properties.name;
    if(!name || centers[name]) continue;
    const c = computeGeometryCentroid(f.geometry);
    if(c) centers[name] = { lat: c.lat, lng: c.lng };
  }
  TSUNAMI_AREA_CENTERS = centers;
}

// 手動選択用<select id="tsunamigen-areas">の選択肢を、実データの全区域名で埋め直す。
// (地図読み込み前はHTML側のプリセット12件が仮表示されているが、読み込み完了後に
//  実際の津波予報区一覧へ差し替える)
function populateTsunamiAreaSelectOptions(){
  const select = document.getElementById('tsunamigen-areas');
  if(!select) return;
  const names = Object.keys(TSUNAMI_AREA_CENTERS).sort((a, b) => a.localeCompare(b, 'ja'));
  if(names.length === 0) return;
  const prevSelected = new Set(Array.from(select.selectedOptions).map(o => o.value));
  select.innerHTML = '';
  for(const name of names){
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if(prevSelected.has(name)) opt.selected = true;
    select.appendChild(opt);
  }
}

// マグニチュードと震央距離(km)から、深さ0km仮定の簡易減衰式で予想津波高さ(m)を算出する。
// 気象庁の津波警報基準(大津波警報:3m超、津波警報:1〜3m、津波注意報:0.2〜1m)に
// おおむね対応するよう、Mが大きいほど・震央距離が近いほど高さが増す簡易モデル。
// あくまでテスト配信用の目安であり、実際の海底地形や伝播特性は考慮していない。
function estimateTsunamiHeightM(mag, distanceKm){
  if(mag == null || isNaN(mag) || distanceKm == null || isNaN(distanceKm)) return 0;
  if(mag < 6.5) return 0; // 津波発生の目安に満たない規模は対象外
  const delta = Math.max(distanceKm, 1);
  // 基準値: M8.0・震央距離100kmで約10mになるよう調整した対数減衰式
  const raw = Math.pow(10, 0.5 * (mag - 6.5)) * (100 / delta) * 0.6;
  return Math.max(0, raw);
}

// 高さ(m)からgrade(発表種別)を判定する。気象庁の発表基準に準拠。
function tsunamiHeightToGrade(heightValue){
  if(heightValue > 3) return 'MajorWarning';
  if(heightValue >= 1) return 'Warning';
  if(heightValue >= 0.2) return 'Watch';
  return null; // 発表基準未満(区域として含めない)
}

// grade別の代表高さ(m)。表示・descriptionの粒度をp2pquake実データの刻みに合わせて丸める。
function snapTsunamiHeight(heightValue, grade){
  if(grade === 'MajorWarning'){
    if(heightValue >= 10) return 10;
    if(heightValue >= 5) return 5;
    return 3;
  }
  if(grade === 'Watch') return 0.2;
  // Warning
  if(heightValue >= 3) return 3;
  return 1;
}

// 震源(lat, lng, mag、深さ0km仮定)から、プリセット12区域それぞれの震央距離減衰で
// 予想津波高さ・gradeを算出し、p2pquake形式のareas配列を組み立てる。
// 発表基準(0.2m)未満の区域は含めない。
function buildTsunamiAreasByAttenuation(lat, lng, mag, condition){
  if(isNaN(lat) || isNaN(lng) || isNaN(mag)) return [];
  const results = [];
  for(const name in TSUNAMI_AREA_CENTERS){
    const center = TSUNAMI_AREA_CENTERS[name];
    const distanceKm = haversineDistanceKm(lat, lng, center.lat, center.lng);
    const heightValue = estimateTsunamiHeightM(mag, distanceKm);
    const grade = tsunamiHeightToGrade(heightValue);
    if(!grade) continue;
    const snappedHeight = snapTsunamiHeight(heightValue, grade);
    results.push({
      name,
      grade,
      immediate: condition === 'ただちに津波が到達すると予想',
      maxHeight: { value: snappedHeight, description: tsunamiHeightDescription(snappedHeight) },
      firstHeight: condition ? { condition } : {},
      _rawHeight: heightValue
    });
  }
  // 予想高さが大きい順に並べ、津波タブ・警報区域一覧でも上位が目立つようにする
  results.sort((a, b) => b._rawHeight - a._rawHeight);
  return results.map(({ name, grade, immediate, maxHeight, firstHeight }) => ({ name, grade, immediate, maxHeight, firstHeight }));
}

// フォームの現在値からp2pquake形式のraw津波オブジェクトを組み立てる。
function buildTsunamiFromForm(){
  const autoCalc = document.getElementById('tsunamigen-autocalc').checked;
  const lat = parseFloat(document.getElementById('tsunamigen-lat').value);
  const lng = parseFloat(document.getElementById('tsunamigen-lng').value);
  const mag = parseFloat(document.getElementById('tsunamigen-mag').value);
  const condition = document.getElementById('tsunamigen-condition').value;

  let areas;
  if(autoCalc){
    // 震源(緯度経度・M、深さ0km仮定)から全プリセット区域までの距離減衰式で
    // 予想高さ・gradeを自動計算する(手入力の発表種別・高さ・区域選択は無視する)。
    areas = buildTsunamiAreasByAttenuation(lat, lng, mag, condition);
  } else {
    // OFFの場合は従来通り手動選択(grade・高さ共通、区域は複数選択)を使う。
    const grade = document.getElementById('tsunamigen-grade').value;
    const heightValue = parseFloat(document.getElementById('tsunamigen-height').value);
    const areasSelect = document.getElementById('tsunamigen-areas');
    const selectedAreaNames = Array.from(areasSelect.selectedOptions).map(o => o.value);
    areas = selectedAreaNames.map(name => ({
      name,
      grade,
      immediate: condition === 'ただちに津波が到達すると予想',
      maxHeight: { value: heightValue, description: tsunamiHeightDescription(heightValue) },
      firstHeight: condition ? { condition } : {}
    }));
  }

  const nowJst = nowAsJstTimeString();
  return {
    id: genTsunamiIdFromNow(),
    code: 552,
    time: nowJst,
    // 震源座標は実際のp2pquakeデータには存在しない拡張フィールドだが、
    // ジェネレータで指定した震源を地図に表示するために自動計算モード時のみ付与する。
    // (手動モードでは震源を指定しないため付与しない)
    latitude: autoCalc && !isNaN(lat) ? lat : null,
    longitude: autoCalc && !isNaN(lng) ? lng : null,
    areas
  };
}

// 「解除報」: 全区域の発表を解除した状態(areas: [])を配信する。
// 実際のp2pquake配信でも、津波警報等がすべて解除されると areas が空になる。
function buildTsunamiCancelFromForm(){
  return {
    id: genTsunamiIdFromNow(),
    code: 552,
    time: nowAsJstTimeString(),
    areas: []
  };
}

function initTsunamiGenerator(){
  const form = document.getElementById('tsunami-gen-form');
  const clearBtn = document.getElementById('tsunamigen-clear');
  if(!form) return;

  // 「区域ごとの予想高さ・発表種別を自動計算する」トグルに応じて、手入力の
  // grade/高さ/区域選択欄を有効/無効(見た目でも分かるよう淡色化)にする。
  const autoCalcEl = document.getElementById('tsunamigen-autocalc');
  const manualFieldEls = [
    document.getElementById('tsunamigen-grade-field'),
    document.getElementById('tsunamigen-height-field'),
    document.getElementById('tsunamigen-areas-field')
  ];
  function syncManualFieldState(){
    manualFieldEls.forEach(el => { if(el) el.classList.toggle('is-disabled', autoCalcEl.checked); });
  }
  if(autoCalcEl){
    autoCalcEl.addEventListener('change', syncManualFieldState);
    syncManualFieldState();
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const raw = buildTsunamiFromForm();
    addEvent(raw, 'ws');
    // 配信したら自動的に津波タブへ切り替えて結果を確認しやすくする
    setActiveTab('tsunami');
  });

  clearBtn.addEventListener('click', () => {
    const raw = buildTsunamiCancelFromForm();
    addEvent(raw, 'ws');
    setActiveTab('tsunami');
  });
}
initTsunamiGenerator();

/* ============================================================
   ジェネレータ種別切り替え(EEW / 津波、設定タブ内でどちらか一方のみ表示)
   ============================================================ */
function initGeneratorTypeSwitch(){
  const eewBtn = document.getElementById('gentype-eew-btn');
  const tsunamiBtn = document.getElementById('gentype-tsunami-btn');
  const eewPanel = document.getElementById('gen-panel-eew');
  const tsunamiPanel = document.getElementById('gen-panel-tsunami');
  if(!eewBtn || !tsunamiBtn || !eewPanel || !tsunamiPanel) return;

  function setGenType(type){
    const isEew = type === 'eew';
    eewBtn.classList.toggle('active', isEew);
    tsunamiBtn.classList.toggle('active', !isEew);
    eewPanel.hidden = !isEew;
    tsunamiPanel.hidden = isEew;
  }

  eewBtn.addEventListener('click', () => setGenType('eew'));
  tsunamiBtn.addEventListener('click', () => setGenType('tsunami'));
}
initGeneratorTypeSwitch();

init();

})();
